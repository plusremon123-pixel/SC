<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>한깨 재미재미 한글게임 정리</title>
  <script src="./hangul-game-data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --ink: #17202a;
      --muted: #64748b;
      --line: #d9e0e8;
      --soft: #f6f8fb;
      --panel: #ffffff;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --warn: #b45309;
      --bad: #b91c1c;
      --blue: #2563eb;
      --shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    html {
      scrollbar-gutter: stable;
    }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
      color: var(--ink);
      background: #eef2f6;
      overflow-y: scroll;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 7px;
      padding: 8px 11px;
      cursor: pointer;
    }

    button:hover { border-color: #94a3b8; }
    button.primary { background: var(--accent); border-color: var(--accent); color: white; }
    button.primary:hover { background: var(--accent-dark); }
    button.blue { background: var(--blue); border-color: var(--blue); color: white; }
    button.ghost { background: transparent; }
    button.danger { color: var(--bad); }
    button:disabled { opacity: .55; cursor: not-allowed; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }

    .source {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .filters {
      padding: 14px 20px;
      display: grid;
      grid-template-columns: minmax(260px, 1.8fr) repeat(2, minmax(160px, 1fr));
      gap: 10px;
      align-items: end;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
    }

    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      min-width: 0;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 8px 10px;
      background: white;
      color: var(--ink);
      min-height: 36px;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
      line-height: 1.45;
    }

    .toggle {
      display: flex;
      gap: 8px;
      align-items: center;
      height: 36px;
      color: var(--ink);
      white-space: nowrap;
    }

    .toggle input {
      width: 16px;
      min-height: 16px;
    }

    .column-controls {
      margin: 14px 20px 0;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      box-shadow: 0 6px 14px rgba(15, 23, 42, 0.04);
    }

    .column-controls-head {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .row-summary {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .column-control-group {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .control-sections {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
    }

    .check-section {
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .check-section.color-section {
      min-width: 360px;
      justify-self: end;
    }

    .check-section-head {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .column-checks,
    .color-checks {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .column-checks label,
    .color-checks label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      color: var(--ink);
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 6px 9px;
      white-space: nowrap;
    }

    .column-checks input,
    .color-checks input {
      width: 14px;
      min-height: 14px;
    }

    main {
      min-height: 0;
      padding: 8px 20px 20px;
    }

    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
      min-width: 1900px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 5;
      background: #e8f1f1;
      border-bottom: 1px solid #b7c8c8;
      color: #173635;
      text-align: left;
      padding: 9px 8px;
      white-space: nowrap;
    }

    tbody td {
      border-bottom: 1px solid #edf1f5;
      padding: 8px;
      vertical-align: top;
      max-width: 220px;
    }

    tbody tr {
      background: white;
      cursor: pointer;
    }

    tbody tr.row-gray {
      background: #f3f4f6;
    }

    tbody tr.row-yellow {
      background: #fffbeb;
    }

    tbody tr.row-green {
      background: #f0fdf4;
    }

    tbody tr:hover {
      background: #eef6ff;
    }

    .color-popover {
      position: fixed;
      z-index: 100;
      display: none;
      gap: 6px;
      align-items: center;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px;
      box-shadow: var(--shadow);
    }

    .color-popover.open {
      display: inline-flex;
    }

    .color-popover button {
      padding: 6px 8px;
      font-size: 12px;
      white-space: nowrap;
    }

    .color-popover button.active-color {
      border-color: var(--accent);
      color: var(--accent-dark);
      font-weight: 700;
    }

    .cell-muted { color: var(--muted); }
    .nowrap { white-space: nowrap; }
    .truncate {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .flag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 12px;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      white-space: nowrap;
    }

    .flag.ok { color: #166534; background: #ecfdf3; border-color: #bbf7d0; }
    .flag.warn { color: var(--warn); background: #fff7ed; border-color: #fed7aa; }
    .flag.bad { color: var(--bad); background: #fef2f2; border-color: #fecaca; }

    .side {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }

    .panel-head {
      border-bottom: 1px solid var(--line);
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .panel-head strong {
      font-size: 15px;
    }

    .detail-body {
      padding: 12px;
      display: grid;
      gap: 10px;
      max-height: calc(100vh - 330px);
      overflow: auto;
    }

    .field-grid {
      display: grid;
      gap: 9px;
    }

    .field-grid label {
      color: #334155;
      font-size: 12px;
    }

    .empty {
      padding: 38px 18px;
      color: var(--muted);
      text-align: center;
    }

    .supabase-body {
      padding: 12px;
      display: grid;
      gap: 9px;
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    dialog {
      width: min(920px, calc(100vw - 30px));
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 0;
    }

    dialog::backdrop {
      background: rgba(15, 23, 42, .42);
    }

    .modal-body {
      padding: 16px;
      max-height: 70vh;
      overflow: auto;
    }

    pre {
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 14px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.5;
    }

    @media (max-width: 1100px) {
      .filters { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stats { grid-template-columns: repeat(3, minmax(120px, 1fr)); }
      main { grid-template-columns: 1fr; }
      .detail-body { max-height: none; }
    }

    @media (max-width: 680px) {
      header { align-items: flex-start; flex-direction: column; }
      .toolbar { justify-content: flex-start; }
      .filters { grid-template-columns: 1fr; }
      .control-sections { grid-template-columns: 1fr; }
      .check-section.color-section { min-width: 0; justify-self: stretch; }
      .column-controls { margin: 12px; }
      main { padding: 12px; }
      h1 { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>한깨 재미재미 한글게임 정리</h1>
      </div>
      <div class="toolbar">
        <button id="exportCsvBtn">CSV</button>
        <button id="exportJsonBtn">JSON</button>
      </div>
    </header>

    <section class="filters">
      <label>통합 검색
        <input id="searchInput" type="search" placeholder="차시명, 목차명, ZIP, 담당자 등" />
      </label>
      <label>전체과목
        <select id="subjectFilter"></select>
      </label>
      <label>목차명
        <select id="menuFilter"></select>
      </label>
    </section>

    <section class="column-controls" aria-label="목록 표시 컬럼 선택">
      <div class="column-controls-head">
        <span class="row-summary" id="rowSummary"></span>
      </div>
      <div class="control-sections">
        <div class="check-section">
          <div class="check-section-head">
            <label class="toggle">
              <input id="columnAll" type="checkbox" checked />
              전체
            </label>
            <span id="columnCount"></span>
          </div>
          <div class="column-checks" id="columnChecks"></div>
        </div>
        <div class="check-section color-section" aria-label="색상 표시 선택">
          <div class="check-section-head">
            <label class="toggle">
              <input id="colorAll" type="checkbox" checked />
              색상 전체
            </label>
            <span id="colorCount"></span>
          </div>
          <div class="color-checks" id="colorChecks"></div>
        </div>
      </div>
    </section>

    <main>
      <section class="table-wrap">
        <table>
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </section>
    </main>
  </div>

  <div id="colorPopover" class="color-popover" role="menu" aria-label="행 색상 선택"></div>

  <script>
    const STORE_KEY = "hangul-game-organizer:v2";
    const TABLE_NAME = "sc2026";
    const IMPORTANT_FIELDS = [
      "앱패키지명", "옵션값(OPT_CODE)", "전체과목코드", "전체과목명", "영역명",
      "단원일련번호", "차시일련번호", "단원노출순서", "목차일련번호", "DTL_LIST",
      "코너일련번호", "코너ZIP파일경로", "코너ZIP파일명", "개정년도", "개정여부",
      "차시명", "차시시스템코드", "목차명", "검증 등록일",
      "검증2차등록일", "목차번호", "DTL_LIST.1"
    ];
    const TABLE_FIELDS = [
      "옵션값(OPT_CODE)", "전체과목명", "영역명", "차시명", "목차명",
      "DTL_LIST", "코너일련번호", "코너ZIP파일경로", "코너ZIP파일명",
      "차시시스템코드", "목차번호", "DTL_LIST.1"
    ];
    const DEFAULT_TABLE_COLUMNS = [
      "전체과목명",
      "차시명",
      "목차명",
      "경로",
      "개정년도",
      "개정여부",
      "차시시스템코드",
      "학기코드",
      "단원노출순서",
      "단원일련번호",
      "차시일련번호",
      "목차일련번호",
      "코너일련번호",
      "코너ZIP파일경로",
      "코너ZIP파일명",
      "검증 등록일"
    ];
    const sourceData = window.HANGUL_GAME_DATA || { columns: [], rows: [] };
    const COLOR_GROUPS = sourceData.colorGroups || ["회색", "노랑", "초록", "투명or흰색"];
    const originalRows = sourceData.rows.map(row => ({
      source_row: row.source_row,
      color_group: row.color_group || "투명or흰색",
      color_code: row.color_code || "",
      payload: { ...row.payload }
    }));
    let rows = loadRows();
    let filteredRows = [];
    let visibleColumns = new Set(DEFAULT_TABLE_COLUMNS);
    let visibleColorGroups = new Set(COLOR_GROUPS);

    const $ = id => document.getElementById(id);
    const tableHead = $("tableHead");
    const tableBody = $("tableBody");
    const colorPopover = $("colorPopover");
    let colorPopoverRow = null;

    init();

    function init() {
      populateFilters();
      renderColumnControls();
      bindEvents();
      applyFilters();
    }

    function loadRows() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORE_KEY) || "null");
        if (saved?.rows?.length) return saved.rows;
      } catch {}
      return originalRows.map(row => ({
        source_row: row.source_row,
        color_group: row.color_group,
        color_code: row.color_code,
        payload: { ...row.payload }
      }));
    }

    function bindEvents() {
      ["searchInput", "subjectFilter", "menuFilter"].forEach(id => {
        $(id).addEventListener("input", applyFilters);
      });
      $("columnAll").addEventListener("change", event => {
        visibleColumns = event.target.checked ? new Set(DEFAULT_TABLE_COLUMNS) : new Set();
        renderColumnControls();
        renderTable();
      });
      $("exportCsvBtn").addEventListener("click", exportCsv);
      $("exportJsonBtn").addEventListener("click", exportJson);
    }

    function populateFilters() {
      fillSelect("subjectFilter", "전체", uniqueValues("전체과목명"));
      fillSelect("menuFilter", "전체", uniqueValues("목차명"));
    }

    function uniqueValues(field) {
      return [...new Set(rows.map(row => cleanText(row.payload[field])).filter(Boolean))].sort((a, b) => a.localeCompare(b, "ko"));
    }

    function fillSelect(id, firstLabel, values) {
      const select = $(id);
      select.innerHTML = `<option value="">${firstLabel}</option>` + values.map(value => `<option>${escapeHtml(value)}</option>`).join("");
    }

    function renderColumnControls() {
      $("columnChecks").innerHTML = DEFAULT_TABLE_COLUMNS.map(field => `
        <label>
          <input type="checkbox" data-column="${escapeAttr(field)}" ${visibleColumns.has(field) ? "checked" : ""} />
          ${escapeHtml(field)}
        </label>
      `).join("");
      $("columnAll").checked = visibleColumns.size === DEFAULT_TABLE_COLUMNS.length;
      $("columnAll").indeterminate = visibleColumns.size > 0 && visibleColumns.size < DEFAULT_TABLE_COLUMNS.length;
      $("columnCount").textContent = `${visibleColumns.size} / ${DEFAULT_TABLE_COLUMNS.length}개 표시`;
      $("columnChecks").querySelectorAll("input[data-column]").forEach(input => {
        input.addEventListener("change", event => {
          const field = event.target.dataset.column;
          event.target.checked ? visibleColumns.add(field) : visibleColumns.delete(field);
          renderColumnControls();
          renderTable();
        });
      });
      $("colorChecks").innerHTML = COLOR_GROUPS.map(group => `
        <label>
          <input type="checkbox" data-color-group="${escapeAttr(group)}" ${visibleColorGroups.has(group) ? "checked" : ""} />
          ${escapeHtml(group)}
        </label>
      `).join("");
      $("colorAll").checked = visibleColorGroups.size === COLOR_GROUPS.length;
      $("colorAll").indeterminate = visibleColorGroups.size > 0 && visibleColorGroups.size < COLOR_GROUPS.length;
      $("colorCount").textContent = `${visibleColorGroups.size} / ${COLOR_GROUPS.length}개 표시`;
      $("colorAll").addEventListener("change", event => {
        visibleColorGroups = event.target.checked ? new Set(COLOR_GROUPS) : new Set();
        renderColumnControls();
        applyFilters();
      });
      $("colorChecks").querySelectorAll("input[data-color-group]").forEach(input => {
        input.addEventListener("change", event => {
          const group = event.target.dataset.colorGroup;
          event.target.checked ? visibleColorGroups.add(group) : visibleColorGroups.delete(group);
          renderColumnControls();
          applyFilters();
        });
      });
    }

    function applyFilters() {
      const term = $("searchInput").value.trim().toLowerCase();
      const subject = $("subjectFilter").value;
      const menu = $("menuFilter").value;

      filteredRows = rows.filter(row => {
        const p = row.payload;
        if (subject && cleanText(p["전체과목명"]) !== subject) return false;
        if (menu && cleanText(p["목차명"]) !== menu) return false;
        if (!visibleColorGroups.has(row.color_group || "투명or흰색")) return false;
        if (term) {
          const haystack = TABLE_FIELDS.concat(["코너ZIP파일경로", "전체과목코드", "경로", "학년코드", "학기코드"])
            .map(field => cleanText(p[field]).toLowerCase()).join(" ");
          if (!haystack.includes(term)) return false;
        }
        return true;
      });

      renderStats();
      renderTable();
    }

    function renderStats() {
      const total = rows.length;
      const visible = filteredRows.length;
      $("rowSummary").textContent = `전체 행 ${total.toLocaleString()} · 현재 보기 ${visible.toLocaleString()}`;
    }

    function renderTable() {
      renderTableHead();
      const maxRows = 500;
      const rendered = filteredRows.slice(0, maxRows);
      tableBody.innerHTML = rendered.map(row => rowHtml(row)).join("");
      if (filteredRows.length > maxRows) {
        tableBody.insertAdjacentHTML("beforeend", `<tr><td colspan="${getVisibleTableColumns().length + 1}" class="cell-muted">현재 ${maxRows.toLocaleString()}행만 표시 중입니다. 검색이나 필터로 범위를 줄여주세요.</td></tr>`);
      }
      tableBody.querySelectorAll("tr[data-row]").forEach(tr => {
        tr.addEventListener("click", event => openColorPopover(Number(tr.dataset.row), event.clientX, event.clientY));
      });
    }

    function getVisibleTableColumns() {
      return DEFAULT_TABLE_COLUMNS.filter(field => visibleColumns.has(field));
    }

    function renderTableHead() {
      const columnHeaders = getVisibleTableColumns().map(field => `<th>${escapeHtml(field)}</th>`).join("");
      tableHead.innerHTML = `<tr>
        <th>행</th>
        ${columnHeaders}
      </tr>`;
    }

    function rowHtml(row) {
      const p = row.payload;
      const colorClass = rowColorClass(row.color_group);
      const colorTitle = row.color_code ? `${row.color_group} · ${row.color_code}` : row.color_group || "투명or흰색";
      const cells = getVisibleTableColumns().map(field => {
        const value = cleanText(p[field]);
        const content = field === "차시명" || field === "목차명" || field === "경로" || field === "코너ZIP파일경로" || field === "코너ZIP파일명"
          ? `<div class="truncate" title="${escapeAttr(value)}">${escapeHtml(value)}</div>`
          : escapeHtml(value);
        return `<td>${content}</td>`;
      }).join("");
      return `<tr data-row="${row.source_row}" class="${colorClass}" title="${escapeAttr(colorTitle)}">
        <td class="nowrap">${row.source_row}</td>
        ${cells}
      </tr>`;
    }

    function exportJson() {
      download(`sc2026-${today()}.json`, JSON.stringify({ table: TABLE_NAME, rows }, null, 2), "application/json;charset=utf-8");
    }

    function exportCsv() {
      const headers = ["source_row", "color_group", "color_code", ...sourceData.columns];
      const lines = [headers.map(csvCell).join(",")];
      rows.forEach(row => {
        lines.push([row.source_row, row.color_group, row.color_code, ...sourceData.columns.map(col => row.payload[col])].map(csvCell).join(","));
      });
      download(`sc2026-${today()}.csv`, lines.join("\n"), "text/csv;charset=utf-8");
    }

    function csvCell(value) {
      const text = cleanText(value).replace(/"/g, '""');
      return `"${text}"`;
    }

    function download(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function rowColorClass(group) {
      if (group === "회색") return "row-gray";
      if (group === "노랑") return "row-yellow";
      if (group === "초록") return "row-green";
      return "";
    }

    function openColorPopover(sourceRow, x, y) {
      const row = rows.find(item => item.source_row === sourceRow);
      if (!row) return;
      colorPopoverRow = row;
      colorPopover.innerHTML = COLOR_GROUPS.map(group => `
        <button type="button" data-color-choice="${escapeAttr(group)}" class="${row.color_group === group ? "active-color" : ""}">
          ${escapeHtml(group)}
        </button>
      `).join("");
      colorPopover.querySelectorAll("button[data-color-choice]").forEach(button => {
        button.addEventListener("click", event => {
          event.stopPropagation();
          setRowColor(button.dataset.colorChoice);
        });
      });
      colorPopover.classList.add("open");
      const margin = 8;
      const width = colorPopover.offsetWidth || 320;
      const height = colorPopover.offsetHeight || 44;
      const left = Math.min(x + margin, window.innerWidth - width - margin);
      const top = Math.min(y + margin, window.innerHeight - height - margin);
      colorPopover.style.left = `${Math.max(margin, left)}px`;
      colorPopover.style.top = `${Math.max(margin, top)}px`;
    }

    function setRowColor(group) {
      if (!colorPopoverRow) return;
      colorPopoverRow.color_group = group;
      colorPopoverRow.color_code = `manual:${group}`;
      closeColorPopover();
      applyFilters();
    }

    function closeColorPopover() {
      colorPopover.classList.remove("open");
      colorPopoverRow = null;
    }

    document.addEventListener("click", event => {
      if (!colorPopover.classList.contains("open")) return;
      if (colorPopover.contains(event.target) || event.target.closest("tr[data-row]")) return;
      closeColorPopover();
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeColorPopover();
    });

    function tag(value) {
      return value ? `<span class="flag">${escapeHtml(value)}</span>` : `<span class="cell-muted">-</span>`;
    }

    function cleanText(value) {
      if (value === null || value === undefined) return "";
      return String(value).replace(/\u3000/g, " ").trim();
    }

    function escapeHtml(value) {
      return cleanText(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("\n", "&#10;");
    }

    function today() {
      return new Date().toISOString().slice(0, 10);
    }
  </script>
</body>
</html>
