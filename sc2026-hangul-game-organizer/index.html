<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>한깨 재미재미 한글게임 정리</title>
  <script src="./hangul-game-data.js"></script>
  <script src="./supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --ink: #17202a;
      --muted: #64748b;
      --line: #d9e0e8;
      --soft: #f6f8fb;
      --panel: #ffffff;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --warn: #b45309;
      --bad: #b91c1c;
      --blue: #2563eb;
      --shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    html {
      scrollbar-gutter: stable;
    }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
      color: var(--ink);
      background: #eef2f6;
      overflow-y: scroll;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 7px;
      padding: 8px 11px;
      cursor: pointer;
    }

    button:hover { border-color: #94a3b8; }
    button.primary { background: var(--accent); border-color: var(--accent); color: white; }
    button.primary:hover { background: var(--accent-dark); }
    button.blue { background: var(--blue); border-color: var(--blue); color: white; }
    button.ghost { background: transparent; }
    button.danger { color: var(--bad); }
    button:disabled { opacity: .55; cursor: not-allowed; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }

    .source {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .filters {
      padding: 14px 20px;
      display: grid;
      grid-template-columns: minmax(260px, 1.8fr) repeat(2, minmax(160px, 1fr));
      gap: 10px;
      align-items: end;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
    }

    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      min-width: 0;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 8px 10px;
      background: white;
      color: var(--ink);
      min-height: 36px;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
      line-height: 1.45;
    }

    .toggle {
      display: flex;
      gap: 8px;
      align-items: center;
      height: 36px;
      color: var(--ink);
      white-space: nowrap;
    }

    .toggle input {
      width: 16px;
      min-height: 16px;
    }

    .column-controls {
      margin: 14px 20px 0;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      box-shadow: 0 6px 14px rgba(15, 23, 42, 0.04);
    }

    .column-controls-head {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .row-summary {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .column-control-group {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .control-sections {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
    }

    .check-section {
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .check-section.color-section {
      min-width: 360px;
      justify-self: end;
    }

    .check-section-head {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .column-checks,
    .color-checks {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .column-checks label,
    .color-checks label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      color: var(--ink);
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 6px 9px;
      white-space: nowrap;
    }

    .column-checks input,
    .color-checks input {
      width: 14px;
      min-height: 14px;
    }

    main {
      min-height: 0;
      padding: 8px 20px 20px;
    }

    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: auto;
    }

    table {
      width: 100%;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
      min-width: 2200px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 5;
      background: #e8f1f1;
      border-bottom: 1px solid #b7c8c8;
      color: #173635;
      text-align: left;
      padding: 9px 8px;
      white-space: nowrap;
    }

    .header-cell {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sort-button {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      flex: 1 1 auto;
      min-width: 0;
      border: 0;
      background: transparent;
      color: inherit;
      padding: 0;
      font-weight: 700;
      text-align: left;
      cursor: pointer;
    }

    .sort-button span:first-child {
      overflow: visible;
      text-overflow: clip;
      white-space: nowrap;
    }

    .sort-button:hover {
      color: var(--accent-dark);
    }

    .sort-mark {
      color: var(--accent);
      font-size: 11px;
      width: 12px;
      min-width: 12px;
      text-align: right;
    }

    .filter-button {
      width: 22px;
      min-width: 22px;
      height: 22px;
      padding: 0;
      border-radius: 5px;
      color: var(--muted);
      background: #ffffff;
    }

    .filter-button.active-filter {
      color: #ffffff;
      background: var(--accent);
      border-color: var(--accent);
    }

    .filter-popover {
      position: fixed;
      z-index: 120;
      display: none;
      width: 220px;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      box-shadow: var(--shadow);
    }

    .filter-popover.open {
      display: grid;
      gap: 8px;
    }

    .filter-popover input {
      min-height: 32px;
      padding: 6px 8px;
      font-size: 12px;
    }

    .filter-value-list {
      display: grid;
      gap: 4px;
      max-height: 190px;
      overflow-y: auto;
      padding-right: 2px;
    }

    .filter-value-list button {
      justify-content: flex-start;
      min-height: 28px;
      padding: 5px 7px;
      border-radius: 5px;
      background: #ffffff;
      font-size: 12px;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .filter-value-list .empty {
      padding: 6px 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .filter-popover-actions {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
    }

    .filter-popover-actions button {
      padding: 5px 8px;
      font-size: 12px;
    }

    tbody td {
      border-bottom: 1px solid #edf1f5;
      padding: 8px;
      vertical-align: top;
    }

    tbody tr {
      background: white;
      cursor: pointer;
    }

    tbody tr.row-gray {
      background: #f3f4f6;
      color: #94a3b8;
    }

    tbody tr.row-yellow {
      background: #fffbeb;
    }

    tbody tr.row-green {
      background: #f0fdf4;
    }

    tbody tr.row-blue {
      background: #dbeafe;
      box-shadow: inset 4px 0 0 #2563eb;
    }

    tbody tr.row-selected {
      background: #dbeafe;
      outline: 2px solid #2563eb;
      outline-offset: -2px;
    }

    tbody tr.row-selected:hover {
      background: #dbeafe;
    }

    tbody tr.row-gray.row-selected,
    tbody tr.row-gray.row-selected:hover {
      background: #e5e7eb;
      color: #64748b;
    }

    tbody tr.row-blue.row-selected,
    tbody tr.row-blue.row-selected:hover {
      background: #bfdbfe;
      box-shadow: inset 4px 0 0 #1d4ed8;
    }

    tbody tr:hover {
      background: #eef6ff;
    }

    .color-popover {
      position: fixed;
      z-index: 100;
      display: none;
      gap: 6px;
      align-items: center;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px;
      box-shadow: var(--shadow);
    }

    .color-popover.open {
      display: inline-flex;
    }

    .color-popover button {
      padding: 6px 8px;
      font-size: 12px;
      white-space: nowrap;
    }

    .color-popover-label {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      padding: 0 4px;
    }

    .color-popover button.active-color {
      border-color: var(--accent);
      color: var(--accent-dark);
      font-weight: 700;
    }

    .cell-muted { color: var(--muted); }
    .nowrap { white-space: nowrap; }
    .truncate {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cell-long {
      white-space: normal;
      word-break: keep-all;
    }

    .cell-path {
      white-space: normal;
      word-break: break-all;
    }

    .cell-dirty {
      color: #dc2626;
      font-weight: 700;
    }

    .cell-editing {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
      background: #ffffff;
      cursor: text;
    }

    .flag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 12px;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      white-space: nowrap;
    }

    .flag.ok { color: #166534; background: #ecfdf3; border-color: #bbf7d0; }
    .flag.warn { color: var(--warn); background: #fff7ed; border-color: #fed7aa; }
    .flag.bad { color: var(--bad); background: #fef2f2; border-color: #fecaca; }

    .side {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }

    .panel-head {
      border-bottom: 1px solid var(--line);
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .panel-head strong {
      font-size: 15px;
    }

    .detail-body {
      padding: 12px;
      display: grid;
      gap: 10px;
      max-height: calc(100vh - 330px);
      overflow: auto;
    }

    .field-grid {
      display: grid;
      gap: 9px;
    }

    .field-grid label {
      color: #334155;
      font-size: 12px;
    }

    .empty {
      padding: 38px 18px;
      color: var(--muted);
      text-align: center;
    }

    .supabase-body {
      padding: 12px;
      display: grid;
      gap: 9px;
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    dialog {
      width: min(920px, calc(100vw - 30px));
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 0;
    }

    dialog::backdrop {
      background: rgba(15, 23, 42, .42);
    }

    .modal-body {
      padding: 16px;
      max-height: 70vh;
      overflow: auto;
    }

    pre {
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 14px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.5;
    }

    @media (max-width: 1100px) {
      .filters { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stats { grid-template-columns: repeat(3, minmax(120px, 1fr)); }
      main { grid-template-columns: 1fr; }
      .detail-body { max-height: none; }
    }

    @media (max-width: 680px) {
      header { align-items: flex-start; flex-direction: column; }
      .toolbar { justify-content: flex-start; }
      .filters { grid-template-columns: 1fr; }
      .control-sections { grid-template-columns: 1fr; }
      .check-section.color-section { min-width: 0; justify-self: stretch; }
      .column-controls { margin: 12px; }
      main { padding: 12px; }
      h1 { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>한깨 재미재미 한글게임 정리</h1>
      </div>
      <div class="toolbar">
        <button id="saveSupabaseBtn">수정사항 저장</button>
        <button id="exportAllBtn">전체 데이터 다운로드</button>
        <button id="exportVisibleBtn">표시 데이터 다운로드</button>
      </div>
    </header>

    <section class="filters">
      <label>통합 검색
        <input id="searchInput" type="search" placeholder="차시명, 목차명, ZIP, 담당자 등" />
      </label>
      <label>전체과목
        <select id="subjectFilter"></select>
      </label>
      <label>목차명
        <select id="menuFilter"></select>
      </label>
    </section>

    <section class="column-controls" aria-label="목록 표시 컬럼 선택">
      <div class="column-controls-head">
        <span class="row-summary" id="rowSummary"></span>
      </div>
      <div class="control-sections">
        <div class="check-section">
          <div class="check-section-head">
            <label class="toggle">
              <input id="columnAll" type="checkbox" checked />
              전체
            </label>
            <span id="columnCount"></span>
          </div>
          <div class="column-checks" id="columnChecks"></div>
        </div>
        <div class="check-section color-section" aria-label="색상 표시 선택">
          <div class="check-section-head">
            <label class="toggle">
              <input id="colorAll" type="checkbox" checked />
              색상 전체
            </label>
            <span id="colorCount"></span>
          </div>
          <div class="color-checks" id="colorChecks"></div>
        </div>
      </div>
    </section>

    <main>
      <section class="table-wrap">
        <table>
          <colgroup id="tableCols"></colgroup>
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </section>
    </main>
  </div>

  <div id="colorPopover" class="color-popover" role="menu" aria-label="행 색상 선택"></div>
  <div id="filterPopover" class="filter-popover" role="dialog" aria-label="열 필터">
    <input id="filterPopoverInput" type="search" placeholder="필터 값" />
    <div id="filterValueList" class="filter-value-list" aria-label="필터 값 목록"></div>
    <div class="filter-popover-actions">
      <button id="filterClearBtn" type="button">지우기</button>
      <button id="filterApplyBtn" type="button" class="primary">적용</button>
    </div>
  </div>

  <script>
    const TABLE_NAME = "sc2026";
    const SETTINGS_TABLE_NAME = "sc2026_settings";
    const DISPLAY_SETTINGS_KEY = "display_preferences";
    const IMPORTANT_FIELDS = [
      "앱패키지명", "옵션값(OPT_CODE)", "전체과목코드", "전체과목명", "영역명",
      "단원일련번호", "차시일련번호", "단원노출순서", "목차일련번호", "DTL_LIST",
      "코너일련번호", "코너ZIP파일경로", "코너ZIP파일명", "개정년도", "개정여부",
      "차시명", "차시시스템코드", "목차명", "검증 등록일",
      "검증2차등록일", "목차번호", "DTL_LIST.1"
    ];
    const TABLE_FIELDS = [
      "옵션값(OPT_CODE)", "전체과목명", "영역명", "차시명", "목차명",
      "DTL_LIST", "코너일련번호", "코너ZIP파일경로", "코너ZIP파일명",
      "차시시스템코드", "목차번호", "DTL_LIST.1"
    ];
    const DEFAULT_TABLE_COLUMNS = [
      "전체과목명",
      "차시명",
      "목차명",
      "경로",
      "개정년도",
      "개정여부",
      "차시시스템코드",
      "학년코드",
      "학기코드",
      "단원노출순서",
      "단원일련번호",
      "차시일련번호",
      "목차일련번호",
      "코너일련번호",
      "코너ZIP파일경로",
      "코너ZIP파일명",
      "검증 등록일"
    ];
    const COLUMN_WIDTHS = {
      "전체과목명": 170,
      "차시명": 230,
      "목차명": 230,
      "경로": 380,
      "개정년도": 88,
      "개정여부": 88,
      "차시시스템코드": 126,
      "학년코드": 82,
      "학기코드": 82,
      "단원노출순서": 94,
      "단원일련번호": 122,
      "차시일련번호": 122,
      "목차일련번호": 122,
      "코너일련번호": 122,
      "코너ZIP파일경로": 190,
      "코너ZIP파일명": 138,
      "검증 등록일": 112
    };
    const COLUMN_LABELS = {
      "단원노출순서": "단원순서"
    };
    const LONG_TEXT_FIELDS = new Set(["전체과목명", "차시명", "목차명"]);
    const FILTERABLE_FIELDS = new Set([
      "전체과목명",
      "차시명",
      "목차명",
      "경로",
      "개정년도",
      "개정여부",
      "검증 등록일"
    ]);
    const sourceData = window.HANGUL_GAME_DATA || { columns: [], rows: [] };
    const SUPABASE_CONFIG = window.SC2026_SUPABASE || {};
    const COLOR_GROUPS = ["파랑", "노랑", "초록", "투명or흰색", "회색"];
    const originalRows = sourceData.rows.map(row => ({
      source_row: row.source_row,
      color_group: row.color_group || "투명or흰색",
      color_code: row.color_code || "",
      payload: { ...row.payload }
    }));
    let rows = cloneOriginalRows();
    let filteredRows = [];
    let visibleColumns = new Set(DEFAULT_TABLE_COLUMNS);
    let visibleColorGroups = new Set(COLOR_GROUPS);
    let sortState = { field: null, direction: "asc" };
    let columnFilters = {};
    let selectedRows = new Set();
    let lastSelectedRow = null;
    let supabaseClient = null;
    let settingsSaveTimer = null;
    let displaySettingsTouched = false;
    const supabaseSaveQueue = new Map();
    const dirtyCells = new Set();

    const $ = id => document.getElementById(id);
    const table = document.querySelector("table");
    const tableCols = $("tableCols");
    const tableHead = $("tableHead");
    const tableBody = $("tableBody");
    const colorPopover = $("colorPopover");
    const filterPopover = $("filterPopover");
    const filterPopoverInput = $("filterPopoverInput");
    const filterValueList = $("filterValueList");
    let colorPopoverRow = null;
    let filterPopoverField = null;

    init();

    function init() {
      initSupabase();
      populateFilters();
      renderColumnControls();
      bindEvents();
      applyFilters();
      loadSharedDisplaySettings();
    }

    function initSupabase() {
      const url = SUPABASE_CONFIG.url || SUPABASE_CONFIG.projectUrl || "";
      const anonKey = SUPABASE_CONFIG.anonKey || SUPABASE_CONFIG.key || "";
      if (url && anonKey && window.supabase?.createClient) {
        supabaseClient = window.supabase.createClient(url, anonKey);
      }
      updateSaveButton();
    }

    function cloneOriginalRows() {
      return originalRows.map(row => ({
        source_row: row.source_row,
        color_group: row.color_group,
        color_code: row.color_code,
        payload: { ...row.payload }
      }));
    }

    function bindEvents() {
      ["searchInput", "subjectFilter", "menuFilter"].forEach(id => {
        $(id).addEventListener("input", applyFilters);
      });
      $("columnAll").addEventListener("change", event => {
        visibleColumns = event.target.checked ? new Set(DEFAULT_TABLE_COLUMNS) : new Set();
        pruneColumnFilters();
        renderColumnControls();
        applyFilters();
        queueSharedDisplaySettingsSave();
      });
      $("saveSupabaseBtn").addEventListener("click", flushSupabaseQueue);
      $("exportAllBtn").addEventListener("click", () => exportCsv(rows, sourceData.columns, "전체"));
      $("exportVisibleBtn").addEventListener("click", () => exportCsv(filteredRows, getVisibleTableColumns(), "표시"));
    }

    function populateFilters() {
      fillSelect("subjectFilter", "전체", uniqueValues("전체과목명"));
      fillSelect("menuFilter", "전체", uniqueValues("목차명"));
    }

    function uniqueValues(field) {
      return [...new Set(rows.map(row => cleanText(row.payload[field])).filter(Boolean))].sort((a, b) => a.localeCompare(b, "ko"));
    }

    function fillSelect(id, firstLabel, values) {
      const select = $(id);
      select.innerHTML = `<option value="">${firstLabel}</option>` + values.map(value => `<option>${escapeHtml(value)}</option>`).join("");
    }

    function renderColumnControls() {
      $("columnChecks").innerHTML = DEFAULT_TABLE_COLUMNS.map(field => `
        <label>
          <input type="checkbox" data-column="${escapeAttr(field)}" ${visibleColumns.has(field) ? "checked" : ""} />
          ${escapeHtml(getColumnLabel(field))}
        </label>
      `).join("");
      $("columnAll").checked = visibleColumns.size === DEFAULT_TABLE_COLUMNS.length;
      $("columnAll").indeterminate = visibleColumns.size > 0 && visibleColumns.size < DEFAULT_TABLE_COLUMNS.length;
      $("columnCount").textContent = `${visibleColumns.size} / ${DEFAULT_TABLE_COLUMNS.length}개 표시`;
      $("columnChecks").querySelectorAll("input[data-column]").forEach(input => {
        input.addEventListener("change", event => {
          const field = event.target.dataset.column;
          event.target.checked ? visibleColumns.add(field) : visibleColumns.delete(field);
          pruneColumnFilters();
          renderColumnControls();
          applyFilters();
          queueSharedDisplaySettingsSave();
        });
      });
      $("colorChecks").innerHTML = COLOR_GROUPS.map(group => `
        <label>
          <input type="checkbox" data-color-group="${escapeAttr(group)}" ${visibleColorGroups.has(group) ? "checked" : ""} />
          ${escapeHtml(group)}
        </label>
      `).join("");
      $("colorAll").checked = visibleColorGroups.size === COLOR_GROUPS.length;
      $("colorAll").indeterminate = visibleColorGroups.size > 0 && visibleColorGroups.size < COLOR_GROUPS.length;
      $("colorCount").textContent = `${visibleColorGroups.size} / ${COLOR_GROUPS.length}개 표시`;
      $("colorAll").onchange = event => {
        visibleColorGroups = event.target.checked ? new Set(COLOR_GROUPS) : new Set();
        renderColumnControls();
        applyFilters();
        queueSharedDisplaySettingsSave();
      };
      $("colorChecks").querySelectorAll("input[data-color-group]").forEach(input => {
        input.addEventListener("change", event => {
          const group = event.target.dataset.colorGroup;
          event.target.checked ? visibleColorGroups.add(group) : visibleColorGroups.delete(group);
          renderColumnControls();
          applyFilters();
          queueSharedDisplaySettingsSave();
        });
      });
    }

    async function loadSharedDisplaySettings() {
      if (!supabaseClient) return;
      try {
        const { data, error } = await supabaseClient
          .from(SETTINGS_TABLE_NAME)
          .select("value")
          .eq("key", DISPLAY_SETTINGS_KEY)
          .maybeSingle();
        if (error) throw error;
        if (displaySettingsTouched || !applySharedDisplaySettings(data?.value)) return;
        renderColumnControls();
        applyFilters();
      } catch (error) {
        console.warn("Supabase settings load failed", error);
      }
    }

    function applySharedDisplaySettings(settings) {
      if (!settings || typeof settings !== "object") return false;
      if (Array.isArray(settings.visibleColumns)) {
        visibleColumns = new Set(settings.visibleColumns.filter(field => DEFAULT_TABLE_COLUMNS.includes(field)));
      }
      if (Array.isArray(settings.visibleColorGroups)) {
        visibleColorGroups = new Set(settings.visibleColorGroups.filter(group => COLOR_GROUPS.includes(group)));
      }
      pruneColumnFilters();
      return true;
    }

    function queueSharedDisplaySettingsSave() {
      if (!supabaseClient) return;
      displaySettingsTouched = true;
      if (settingsSaveTimer) clearTimeout(settingsSaveTimer);
      settingsSaveTimer = setTimeout(saveSharedDisplaySettings, 300);
    }

    async function saveSharedDisplaySettings() {
      if (!supabaseClient) return;
      settingsSaveTimer = null;
      try {
        const { error } = await supabaseClient
          .from(SETTINGS_TABLE_NAME)
          .upsert({
            key: DISPLAY_SETTINGS_KEY,
            value: {
              visibleColumns: [...visibleColumns],
              visibleColorGroups: [...visibleColorGroups]
            }
          }, { onConflict: "key" });
        if (error) throw error;
      } catch (error) {
        console.warn("Supabase settings save failed", error);
      }
    }

    function applyFilters(renderHead = true) {
      const term = $("searchInput").value.trim().toLowerCase();
      const subject = $("subjectFilter").value;
      const menu = $("menuFilter").value;

      filteredRows = rows.filter(row => {
        const p = row.payload;
        if (subject && cleanText(p["전체과목명"]) !== subject) return false;
        if (menu && cleanText(p["목차명"]) !== menu) return false;
        if (!visibleColorGroups.has(row.color_group || "투명or흰색")) return false;
        if (!passesColumnFilters(row)) return false;
        if (term) {
          const haystack = TABLE_FIELDS.concat(["코너ZIP파일경로", "전체과목코드", "경로", "학년코드", "학기코드"])
            .map(field => cleanText(p[field]).toLowerCase()).join(" ");
          if (!haystack.includes(term)) return false;
        }
        return true;
      });
      applySort();
      moveGrayRowsLast();
      pruneSelectedRows();

      renderStats();
      renderTable(renderHead);
    }

    function renderStats() {
      const total = rows.length;
      const visible = filteredRows.length;
      $("rowSummary").textContent = `전체 행 ${total.toLocaleString()} · 현재 보기 ${visible.toLocaleString()}`;
    }

    function pruneSelectedRows() {
      const visibleRowIds = new Set(filteredRows.map(row => row.source_row));
      selectedRows = new Set([...selectedRows].filter(rowId => visibleRowIds.has(rowId)));
      if (lastSelectedRow && !visibleRowIds.has(lastSelectedRow)) lastSelectedRow = null;
    }

    function renderTable(renderHead = true) {
      if (renderHead) renderTableHead();
      const maxRows = 500;
      const rendered = filteredRows.slice(0, maxRows);
      tableBody.innerHTML = rendered.map(row => rowHtml(row)).join("");
      if (filteredRows.length > maxRows) {
        tableBody.insertAdjacentHTML("beforeend", `<tr><td colspan="${getVisibleTableColumns().length}" class="cell-muted">현재 ${maxRows.toLocaleString()}행만 표시 중입니다. 검색이나 필터로 범위를 줄여주세요.</td></tr>`);
      }
      tableBody.querySelectorAll("tr[data-row]").forEach(tr => {
        tr.addEventListener("click", event => {
          if (event.detail > 1 || event.target.closest("input, [contenteditable]")) return;
          handleRowClick(Number(tr.dataset.row), event);
        });
        tr.addEventListener("contextmenu", event => {
          if (event.target.closest("input, [contenteditable]")) return;
          event.preventDefault();
          handleRowContextMenu(Number(tr.dataset.row), event);
        });
      });
      tableBody.querySelectorAll("td[data-field]").forEach(td => {
        td.addEventListener("dblclick", event => {
          event.stopPropagation();
          startCellEdit(td);
        });
      });
    }

    function getVisibleTableColumns() {
      return DEFAULT_TABLE_COLUMNS.filter(field => visibleColumns.has(field));
    }

    function pruneColumnFilters() {
      columnFilters = Object.fromEntries(
        Object.entries(columnFilters).filter(([field]) => FILTERABLE_FIELDS.has(field) && visibleColumns.has(field))
      );
    }

    function renderTableHead() {
      renderTableColumns();
      const columnHeaders = getVisibleTableColumns().map(field => `<th>${headerCell(field, getColumnLabel(field))}</th>`).join("");
      tableHead.innerHTML = `<tr>
        ${columnHeaders}
      </tr>`;
      tableHead.querySelectorAll("button[data-sort-field]").forEach(button => {
        button.addEventListener("click", () => toggleSort(button.dataset.sortField));
      });
      tableHead.querySelectorAll("button[data-filter-field]").forEach(button => {
        button.addEventListener("click", event => {
          event.stopPropagation();
          openFilterPopover(button.dataset.filterField, event.clientX, event.clientY);
        });
      });
    }

    function renderTableColumns() {
      const fields = getVisibleTableColumns();
      tableCols.innerHTML = fields.map(field => `<col style="width: ${getColumnWidth(field)}px" />`).join("");
      const totalWidth = fields.reduce((sum, field) => sum + getColumnWidth(field), 0);
      table.style.minWidth = `${Math.max(1200, totalWidth)}px`;
    }

    function getColumnWidth(field) {
      return COLUMN_WIDTHS[field] || 120;
    }

    function getColumnLabel(field) {
      return COLUMN_LABELS[field] || field;
    }

    function headerCell(field, label) {
      return `<div class="header-cell">${sortHeader(field, label)}${filterButton(field)}</div>`;
    }

    function sortHeader(field, label) {
      const mark = sortState.field === field ? (sortState.direction === "asc" ? "▲" : "▼") : "";
      return `<button type="button" class="sort-button" data-sort-field="${escapeAttr(field)}" title="정렬" aria-label="${escapeAttr(`${label} 정렬`)}">
        <span>${escapeHtml(label)}</span><span class="sort-mark">${mark}</span>
      </button>`;
    }

    function filterButton(field) {
      if (!FILTERABLE_FIELDS.has(field)) return "";
      const active = columnFilters[field] ? " active-filter" : "";
      return `<button type="button" class="filter-button${active}" data-filter-field="${escapeAttr(field)}" title="필터">▾</button>`;
    }

    function toggleSort(field) {
      if (sortState.field !== field) {
        sortState = { field, direction: "desc" };
      } else if (sortState.direction === "desc") {
        sortState = { field, direction: "asc" };
      } else {
        sortState = { field: null, direction: null };
        applyFilters();
        return;
      }
      applySort();
      moveGrayRowsLast();
      renderTable();
    }

    function applySort() {
      if (!sortState.field) return;
      const direction = sortState.direction === "asc" ? 1 : -1;
      filteredRows.sort((a, b) => compareRows(a, b, sortState.field) * direction);
    }

    function moveGrayRowsLast() {
      filteredRows.sort((a, b) => {
        const aGray = (a.color_group || "투명or흰색") === "회색";
        const bGray = (b.color_group || "투명or흰색") === "회색";
        return Number(aGray) - Number(bGray);
      });
    }

    function passesColumnFilters(row, excludedField = null) {
      return Object.entries(columnFilters).every(([field, filter]) => {
        if (field === excludedField) return true;
        const value = field === "__row" ? row.source_row : row.payload[field];
        return cleanText(value).toLowerCase().includes(filter.toLowerCase());
      });
    }

    function compareRows(a, b, field) {
      const av = field === "__row" ? a.source_row : a.payload[field];
      const bv = field === "__row" ? b.source_row : b.payload[field];
      const an = toSortableNumber(av);
      const bn = toSortableNumber(bv);
      if (an !== null && bn !== null) return an - bn;
      return cleanText(av).localeCompare(cleanText(bv), "ko", { numeric: true, sensitivity: "base" });
    }

    function toSortableNumber(value) {
      if (value === null || value === undefined || value === "") return null;
      if (typeof value === "number" && Number.isFinite(value)) return value;
      const text = cleanText(value).replace(/,/g, "");
      if (!text || !/^-?\d+(\.\d+)?$/.test(text)) return null;
      return Number(text);
    }

    function rowHtml(row) {
      const p = row.payload;
      const colorClass = [rowColorClass(row.color_group), selectedRows.has(row.source_row) ? "row-selected" : ""].filter(Boolean).join(" ");
      const colorTitle = row.color_code ? `${row.color_group} · ${row.color_code}` : row.color_group || "투명or흰색";
      const cells = getVisibleTableColumns().map(field => {
        const value = cleanText(p[field]);
        const baseClass = LONG_TEXT_FIELDS.has(field) ? "cell-long" : (field === "경로" ? "cell-path" : "nowrap");
        const cellClass = [baseClass, dirtyCells.has(dirtyKey(row.source_row, field)) ? "cell-dirty" : ""].filter(Boolean).join(" ");
        return `<td class="${cellClass}" data-field="${escapeAttr(field)}">${escapeHtml(value)}</td>`;
      }).join("");
      return `<tr data-row="${row.source_row}" class="${colorClass}" title="${escapeAttr(colorTitle)}">
        ${cells}
      </tr>`;
    }

    function handleRowClick(sourceRow, event) {
      if (event.ctrlKey || event.metaKey) {
        toggleRowSelection(sourceRow);
        return;
      }
      if (event.shiftKey) {
        selectRowRange(sourceRow);
        return;
      }
      selectSingleRow(sourceRow);
    }

    function handleRowContextMenu(sourceRow, event) {
      if (!selectedRows.has(sourceRow)) {
        selectSingleRow(sourceRow);
      }
      openColorPopover(sourceRow, event.clientX, event.clientY);
    }

    function selectSingleRow(sourceRow) {
      selectedRows.clear();
      selectedRows.add(sourceRow);
      lastSelectedRow = sourceRow;
      closeColorPopover();
      renderTable(false);
    }

    function toggleRowSelection(sourceRow) {
      if (selectedRows.has(sourceRow)) selectedRows.delete(sourceRow);
      else selectedRows.add(sourceRow);
      lastSelectedRow = sourceRow;
      closeColorPopover();
      renderTable(false);
    }

    function selectRowRange(sourceRow) {
      const visibleSourceRows = filteredRows.map(row => row.source_row);
      const from = lastSelectedRow ?? sourceRow;
      const fromIndex = visibleSourceRows.indexOf(from);
      const toIndex = visibleSourceRows.indexOf(sourceRow);
      if (fromIndex === -1 || toIndex === -1) {
        selectedRows.add(sourceRow);
      } else {
        const [start, end] = fromIndex < toIndex ? [fromIndex, toIndex] : [toIndex, fromIndex];
        visibleSourceRows.slice(start, end + 1).forEach(rowId => selectedRows.add(rowId));
      }
      lastSelectedRow = sourceRow;
      closeColorPopover();
      renderTable(false);
    }

    function startCellEdit(cell) {
      if (cell.isContentEditable) return;
      const rowEl = cell.closest("tr[data-row]");
      const row = rows.find(item => item.source_row === Number(rowEl?.dataset.row));
      const field = cell.dataset.field;
      if (!row || !field) return;
      closeColorPopover();
      const originalValue = cleanText(row.payload[field]);
      cell.textContent = originalValue;
      cell.setAttribute("contenteditable", "plaintext-only");
      cell.classList.add("cell-editing");
      cell.focus();
      selectCellText(cell);
      let committed = false;
      const finish = value => {
        cell.removeEventListener("keydown", handleEditKeydown);
        cell.removeAttribute("contenteditable");
        cell.classList.remove("cell-editing");
        cell.textContent = cleanText(value);
        cell.classList.toggle("cell-dirty", dirtyCells.has(dirtyKey(row.source_row, field)));
      };
      const commit = () => {
        if (committed) return;
        committed = true;
        const nextValue = cell.textContent.trim();
        const storedValue = nextValue || null;
        row.payload[field] = storedValue;
        if (storedValue !== (originalValue || null)) dirtyCells.add(dirtyKey(row.source_row, field));
        finish(storedValue);
        if (storedValue !== (originalValue || null)) queueSupabaseSave(row);
      };
      const cancel = () => {
        if (committed) return;
        committed = true;
        finish(originalValue);
      };
      const handleEditKeydown = event => {
        if (event.key === "Enter") {
          event.preventDefault();
          commit();
        }
        if (event.key === "Escape") {
          event.preventDefault();
          event.stopPropagation();
          cancel();
        }
      };
      cell.addEventListener("keydown", handleEditKeydown);
      cell.addEventListener("blur", commit, { once: true });
    }

    function selectCellText(cell) {
      const selection = window.getSelection();
      const range = document.createRange();
      range.selectNodeContents(cell);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function exportCsv(targetRows, fields, scope) {
      const headers = ["color_group", "color_code", ...fields.map(getColumnLabel)];
      const lines = [headers.map(csvCell).join(",")];
      targetRows.forEach(row => {
        lines.push([row.color_group, row.color_code, ...fields.map(field => row.payload[field])].map(csvCell).join(","));
      });
      download(`sc2026-${scope}-${today()}.csv`, `\ufeff${lines.join("\n")}`, "text/csv;charset=utf-8");
    }

    function csvCell(value) {
      const text = cleanText(value).replace(/"/g, '""');
      return `"${text}"`;
    }

    function download(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function rowColorClass(group) {
      if (group === "회색") return "row-gray";
      if (group === "노랑") return "row-yellow";
      if (group === "초록") return "row-green";
      if (group === "파랑") return "row-blue";
      return "";
    }

    function openColorPopover(sourceRow, x, y) {
      const row = rows.find(item => item.source_row === sourceRow);
      if (!row) return;
      colorPopoverRow = row;
      const targetRows = getColorTargetRows();
      const label = targetRows.length > 1 ? `<div class="color-popover-label">${targetRows.length.toLocaleString()}행 색상 변경</div>` : "";
      colorPopover.innerHTML = COLOR_GROUPS.map(group => `
        ${label && group === COLOR_GROUPS[0] ? label : ""}
        <button type="button" data-color-choice="${escapeAttr(group)}" class="${row.color_group === group ? "active-color" : ""}">
          ${escapeHtml(group)}
        </button>
      `).join("");
      colorPopover.querySelectorAll("button[data-color-choice]").forEach(button => {
        button.addEventListener("click", event => {
          event.stopPropagation();
          setRowColor(button.dataset.colorChoice);
        });
      });
      colorPopover.classList.add("open");
      const margin = 8;
      const width = colorPopover.offsetWidth || 320;
      const height = colorPopover.offsetHeight || 44;
      const left = Math.min(x + margin, window.innerWidth - width - margin);
      const top = Math.min(y + margin, window.innerHeight - height - margin);
      colorPopover.style.left = `${Math.max(margin, left)}px`;
      colorPopover.style.top = `${Math.max(margin, top)}px`;
    }

    function setRowColor(group) {
      if (!colorPopoverRow) return;
      getColorTargetRows().forEach(row => {
        row.color_group = group;
        row.color_code = `manual:${group}`;
        queueSupabaseSave(row);
      });
      selectedRows.clear();
      lastSelectedRow = null;
      closeColorPopover();
      applyFilters();
    }

    function getColorTargetRows() {
      const selected = rows.filter(row => selectedRows.has(row.source_row));
      return selected.length ? selected : [colorPopoverRow].filter(Boolean);
    }

    function queueSupabaseSave(row) {
      if (!supabaseClient) return;
      supabaseSaveQueue.set(row.source_row, toSupabaseRow(row));
      updateSaveButton();
    }

    async function flushSupabaseQueue() {
      if (!supabaseClient || !supabaseSaveQueue.size) return;
      const payload = [...supabaseSaveQueue.values()];
      const savedRowKeys = new Set(payload.map(row => row.source_row));
      supabaseSaveQueue.clear();
      updateSaveButton("저장 중...", true);
      try {
        const { error } = await supabaseClient
          .from(TABLE_NAME)
          .upsert(payload, { onConflict: "source_row" });
        if (error) throw error;
        dirtyCells.forEach(key => {
          const [sourceRow] = key.split("::");
          if (savedRowKeys.has(Number(sourceRow)) && !supabaseSaveQueue.has(Number(sourceRow))) {
            dirtyCells.delete(key);
          }
        });
        renderTable(false);
        updateSaveButton();
      } catch (error) {
        console.warn("Supabase save failed", error);
        payload.forEach(row => supabaseSaveQueue.set(row.source_row, row));
        updateSaveButton(`저장 실패 (${supabaseSaveQueue.size})`);
      }
    }

    function updateSaveButton(label = null, forceDisabled = false) {
      const button = $("saveSupabaseBtn");
      if (!button) return;
      const count = supabaseSaveQueue.size;
      if (!supabaseClient) {
        button.disabled = true;
        button.textContent = "DB 연결 없음";
        return;
      }
      button.disabled = forceDisabled || !count;
      button.textContent = label || (count ? `수정사항 저장 (${count})` : "수정사항 저장");
    }

    function dirtyKey(sourceRow, field) {
      return `${sourceRow}::${field}`;
    }

    function toSupabaseRow(row) {
      return {
        source_row: row.source_row,
        color_group: row.color_group || "투명or흰색",
        color_code: row.color_code || null,
        payload: row.payload || {}
      };
    }

    function openFilterPopover(field, x, y) {
      filterPopoverField = field;
      filterPopoverInput.value = columnFilters[field] || "";
      renderFilterValueList();
      filterPopover.classList.add("open");
      const margin = 8;
      const width = filterPopover.offsetWidth || 220;
      const height = filterPopover.offsetHeight || 280;
      const left = Math.min(x + margin, window.innerWidth - width - margin);
      const top = Math.min(y + margin, window.innerHeight - height - margin);
      filterPopover.style.left = `${Math.max(margin, left)}px`;
      filterPopover.style.top = `${Math.max(margin, top)}px`;
      filterPopoverInput.focus();
      filterPopoverInput.select();
    }

    function renderFilterValueList() {
      if (!filterPopoverField) return;
      const typed = filterPopoverInput.value.trim().toLowerCase();
      const values = getFilterValues(filterPopoverField)
        .filter(value => !typed || value.toLowerCase().includes(typed))
        .slice(0, 80);
      if (!values.length) {
        filterValueList.innerHTML = `<div class="empty">선택 가능한 값 없음</div>`;
        return;
      }
      filterValueList.innerHTML = values.map(value => `
        <button type="button" data-filter-value="${escapeAttr(value)}" title="${escapeAttr(value)}">${escapeHtml(value)}</button>
      `).join("");
      filterValueList.querySelectorAll("button[data-filter-value]").forEach(button => {
        button.addEventListener("click", () => {
          filterPopoverInput.value = button.dataset.filterValue || "";
          applyFilterPopover();
        });
      });
    }

    function getFilterValues(field) {
      return [...new Set(rows
        .filter(row => rowPassesFiltersExcept(row, field))
        .map(row => cleanText(field === "__row" ? row.source_row : row.payload[field]))
        .filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, "ko", { numeric: true }));
    }

    function rowPassesFiltersExcept(row, excludedField) {
      const term = $("searchInput").value.trim().toLowerCase();
      const subject = $("subjectFilter").value;
      const menu = $("menuFilter").value;
      const p = row.payload;
      if (subject && cleanText(p["전체과목명"]) !== subject) return false;
      if (menu && cleanText(p["목차명"]) !== menu) return false;
      if (!visibleColorGroups.has(row.color_group || "투명or흰색")) return false;
      if (!passesColumnFilters(row, excludedField)) return false;
      if (term) {
        const haystack = TABLE_FIELDS.concat(["코너ZIP파일경로", "전체과목코드", "경로", "학년코드", "학기코드"])
          .map(fieldName => cleanText(p[fieldName]).toLowerCase()).join(" ");
        if (!haystack.includes(term)) return false;
      }
      return true;
    }

    function applyFilterPopover() {
      if (!filterPopoverField || !FILTERABLE_FIELDS.has(filterPopoverField)) return;
      const value = filterPopoverInput.value.trim();
      if (value) columnFilters[filterPopoverField] = value;
      else delete columnFilters[filterPopoverField];
      closeFilterPopover();
      applyFilters();
    }

    function clearFilterPopover() {
      if (filterPopoverField) delete columnFilters[filterPopoverField];
      closeFilterPopover();
      applyFilters();
    }

    function closeFilterPopover() {
      filterPopover.classList.remove("open");
      filterPopoverField = null;
      filterValueList.innerHTML = "";
    }

    function closeColorPopover() {
      colorPopover.classList.remove("open");
      colorPopoverRow = null;
    }

    function clearRowSelection() {
      if (!selectedRows.size && !lastSelectedRow) return;
      selectedRows.clear();
      lastSelectedRow = null;
      renderTable(false);
    }

    $("filterApplyBtn").addEventListener("click", applyFilterPopover);
    $("filterClearBtn").addEventListener("click", clearFilterPopover);
    filterPopoverInput.addEventListener("keydown", event => {
      if (event.key === "Enter") applyFilterPopover();
      if (event.key === "Escape") closeFilterPopover();
    });
    filterPopoverInput.addEventListener("input", renderFilterValueList);

    document.addEventListener("click", event => {
      if (colorPopover.classList.contains("open") && !colorPopover.contains(event.target) && !event.target.closest("tr[data-row]")) {
        closeColorPopover();
      }
      if (filterPopover.classList.contains("open") && !filterPopover.contains(event.target) && !event.target.closest("button[data-filter-field]")) {
        closeFilterPopover();
      }
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        clearRowSelection();
        closeColorPopover();
        closeFilterPopover();
      }
    });

    function tag(value) {
      return value ? `<span class="flag">${escapeHtml(value)}</span>` : `<span class="cell-muted">-</span>`;
    }

    function cleanText(value) {
      if (value === null || value === undefined) return "";
      return String(value).replace(/\u3000/g, " ").trim();
    }

    function escapeHtml(value) {
      return cleanText(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("\n", "&#10;");
    }

    function today() {
      return new Date().toISOString().slice(0, 10);
    }
  </script>
</body>
</html>
