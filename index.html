<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>5,6개정 실무 관리 툴</title>
    <link rel="stylesheet" href="./styles.css?v=20260703-21" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>5,6개정 실무 관리 툴</h1>
        </div>
      </header>

      <nav class="view-tabs" aria-label="화면 선택">
        <button id="lessonViewButton" type="button" class="active">차시별 일정</button>
        <button id="overallViewButton" type="button">콘텐츠 오픈 예정일</button>
        <button id="mathAnalysisViewButton" type="button">수학 차시별 분석</button>
        <button id="scheduleCardViewButton" type="button">스케쥴 카드</button>
      </nav>

      <div id="lessonView">
        <section class="view-action-bar">
          <label class="file-button">
            차시 엑셀 업로드/교체
            <input id="fileInput" type="file" accept=".xlsx,.xls" />
          </label>
          <button id="downloadButton" type="button" class="primary">차시 엑셀 다운로드</button>
        </section>

        <section class="tab-section">
          <div id="dateTabs" class="tabs date-tabs"></div>
        </section>

        <section class="controls">
          <label class="search">
            <input id="searchInput" type="search" placeholder="단원명, 차시명, 출판사 검색" />
          </label>
          <div class="order-control" aria-label="탭 순서 선택">
            <div class="segmented">
              <button id="categoryFirstButton" type="button" data-tab-order="category-first">구분 먼저</button>
              <button id="subjectFirstButton" type="button" data-tab-order="subject-first">과목 먼저</button>
            </div>
          </div>
        </section>

        <section id="releaseTimelineSection" class="timeline-section" hidden>
          <div class="timeline-head">
            <div id="timelineRange" class="timeline-range"></div>
            <div id="timelineSummary" class="timeline-summary"></div>
            <div class="timeline-legend" aria-label="체크 상태 선택">
              <button type="button" class="timeline-mode qa active" data-timeline-mode="qa">검증계</button>
              <button type="button" class="timeline-mode stage" data-timeline-mode="stage">스테이징</button>
              <button id="qaCopyButton" type="button" class="timeline-mode copy">QA 복사</button>
            </div>
          </div>
          <div id="timelineMonths" class="timeline-months"></div>
          <div id="releaseTimeline" class="timeline-grid"></div>
        </section>

        <div class="depth-row">
          <section class="tab-section">
            <div id="primaryTabs" class="tabs"></div>
          </section>

          <section class="tab-section">
            <div id="secondaryTabs" class="tabs"></div>
          </section>
        </div>

        <section class="table-wrap">
          <div class="table-head">
            <strong id="tableTitle">조회 결과</strong>
            <span id="rowCount">0건</span>
          </div>
          <div class="scroll-area">
            <table>
              <thead id="tableHeader"></thead>
              <tbody id="tableBody"></tbody>
            </table>
            <div id="emptyState" class="empty" hidden>조건에 맞는 데이터가 없습니다.</div>
          </div>
        </section>
      </div>

      <div id="mathAnalysisView" hidden>
        <section class="math-analysis-panel">
          <div class="analysis-head">
            <strong>수학 차시별 분석</strong>
            <span id="mathAnalysisSummary"></span>
          </div>
          <div id="mathAnalysisDateTabs" class="tabs date-tabs analysis-date-tabs"></div>
          <div id="mathPublisherFilters" class="publisher-filters"></div>
          <div id="mathAnalysisKpis" class="analysis-kpis"></div>
          <div class="scroll-area analysis-scroll">
            <table class="analysis-table">
              <thead>
                <tr>
                  <th>학년</th>
                  <th>단원</th>
                  <th>차시</th>
                  <th>중복 출판사</th>
                  <th>중복수</th>
                </tr>
              </thead>
              <tbody id="mathAnalysisTableBody"></tbody>
            </table>
            <div id="mathAnalysisEmptyState" class="empty" hidden>수학 학교공부 데이터가 없습니다.</div>
          </div>
        </section>
      </div>

      <div id="scheduleCardView" hidden>
        <section class="schedule-card-panel">
          <iframe
            id="scheduleCardFrame"
            title="스케쥴 카드"
            src="./schedule-card/index.html?v=20260706-1"
          ></iframe>
        </section>
      </div>

      <div id="overallView" hidden>
        <section class="view-action-bar">
          <label class="file-button">
            콘텐츠 일정 업로드/교체
            <input id="overallFileInput" type="file" accept=".xlsx,.xls" />
          </label>
        </section>
        <section class="overall-panel">
          <div class="scroll-area overall-scroll">
            <table>
              <thead id="overallTableHeader"></thead>
              <tbody id="overallTableBody"></tbody>
            </table>
            <div id="overallEmptyState" class="empty" hidden>콘텐츠 오픈 예정일 데이터를 불러오지 못했습니다.</div>
          </div>
        </section>
      </div>
    </main>

    <div id="toast" class="toast" hidden></div>

    <script src="./vendor/exceljs.min.js?v=20260703-39"></script>
    <script src="./app.js?v=20260703-40"></script>
  </body>
</html>
