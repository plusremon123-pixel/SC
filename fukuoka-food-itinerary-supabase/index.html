<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>후쿠오카 2027 식도락 추천 코스</title>
  <style>
    :root {
      --ink: #1f2933;
      --muted: #69747c;
      --line: #e5e7eb;
      --paper: #f6f7f8;
      --card: #ffffff;
      --green: #2563eb;
      --green2: #eef4ff;
      --red: #334155;
      --yellow: #d7dee8;
      --soft: #f1f5f9;
      --shadow: 0 14px 32px rgba(15, 23, 42, .10);
      --shadow2: 0 6px 18px rgba(15, 23, 42, .06);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.58;
    }

    a { color: inherit; }

    .hero {
      min-height: auto;
      display: grid;
      align-items: end;
      color: #fff;
      background: #111827;
    }

    .wrap { width: min(1180px, calc(100% - 40px)); margin: 0 auto; }

    .hero-inner { padding: 18px 0 16px; }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border: 1px solid rgba(255,255,255,.42);
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      font-size: 12px;
      font-weight: 800;
    }

    h1 {
      max-width: 820px;
      margin: 10px 0 6px;
      font-size: clamp(24px, 3.2vw, 34px);
      line-height: 1.16;
      letter-spacing: 0;
    }

    .refresh-info {
      flex: 0 0 auto;
      background: #fff;
      color: #222;
      border: 1px solid #bbb;
    }

    .lead {
      max-width: 760px;
      margin: 0;
      color: rgba(255,255,255,.9);
      font-size: 14px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(24,33,36,.1);
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(16px);
    }

    nav {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 12px 0;
    }

    nav a {
      flex: 0 0 auto;
      text-decoration: none;
      padding: 9px 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #223033;
      background: #fff;
      font-size: 13px;
      font-weight: 800;
    }

    main { padding: 16px 0 54px; }

    .notice {
      margin: 0 0 22px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-left: 4px solid #64748b;
      border-radius: 8px;
      background: #fff;
      color: #475569;
      font-size: 14px;
    }

    .planner {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 22px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,253,248,.86);
      box-shadow: var(--shadow2);
    }

    .selected-panel {
      position: static;
      overflow: visible;
    }

    .panel-head {
      padding: 17px 18px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .panel-head h2, .day h2 {
      margin: 0 0 6px;
      font-size: 22px;
      letter-spacing: 0;
    }

    .panel-head p, .day-head p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .selected-list { padding: 12px; }

    .selected-day {
      margin-bottom: 14px;
    }

    .selected-day h3 {
      margin: 4px 0 8px;
      padding: 8px 10px;
      border-radius: 8px;
      background: #eef4ff;
      color: var(--green);
      font-size: 15px;
    }

    .selected-item {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      margin-bottom: 10px;
    }

    .selected-item.focused,
    .selected-day.focused h3 {
      outline: 2px solid #222;
      outline-offset: 2px;
    }

    .selected-item b {
      display: block;
      margin-bottom: 3px;
      color: var(--green);
      font-size: 13px;
    }

    .selected-item strong { display: block; font-size: 15px; }

    .jp-name {
      display: block;
      color: var(--ink);
    }

    .ko-name {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .selected-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 9px;
    }

    .route-link {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 10px;
      align-items: center;
      margin: -3px 0 9px;
      padding: 8px 10px;
      border-left: 2px dashed #cbd5e1;
      color: #415054;
      font-size: 12px;
    }

    .route-link span {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #eef4ff;
      color: var(--green);
      font-weight: 900;
    }

    .day-route-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 10px;
    }

    .btn, button {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 11px;
      border: 1px solid transparent;
      border-radius: 7px;
      font: inherit;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    .btn.primary, button.primary { color: #fff; background: var(--green); }
    .btn.light { color: var(--green); background: var(--green2); border-color: #cfe0ff; }
    .btn.ghost { color: #324044; background: #fff; border-color: var(--line); }

    .total {
      margin: 0 12px 14px;
      padding: 13px 14px;
      border-radius: 8px;
      background: #183033;
      color: #fff;
      font-size: 14px;
    }

    .day {
      margin-bottom: 18px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      box-shadow: var(--shadow2);
    }

    .day-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--line);
    }

    .tag {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      padding: 5px 9px;
      border-radius: 999px;
      background: #f1f5f9;
      color: #475569;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .route {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 16px 0 8px;
    }

    .step {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
    }

    .step b { display: block; color: var(--green); font-size: 15px; }

    .meal {
      margin-top: 16px;
    }

    .meal-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 9px;
    }

    .meal-title h3 {
      margin: 0;
      font-size: 19px;
    }

    .meal-title-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .reroll {
      min-height: 30px;
      padding: 5px 9px;
      font-size: 12px;
      background: #fff;
      color: #222;
      border-color: #bbb;
    }

    .meal-title span {
      color: var(--muted);
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--card);
      box-shadow: var(--shadow2);
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
      cursor: pointer;
    }

    .card::before {
      content: "";
      display: block;
      height: 7px;
      background: #111827;
    }

    .card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }

    .card.is-selected {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(15,111,102,.18), var(--shadow);
    }

    .rank {
      position: static;
      flex: 0 0 auto;
      padding: 5px 9px;
      border-radius: 999px;
      background: #f8fafc;
      color: #475569;
      font-size: 12px;
      font-weight: 900;
      box-shadow: 0 4px 10px rgba(0,0,0,.12);
    }

    .card-title {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      min-width: 0;
    }

    .card-title h4 {
      flex: 1 1 auto;
      min-width: 0;
    }

    .card-body {
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 7px;
      padding: 12px;
    }

    .card h4 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
    }

    .google-rating {
      color: #333;
      font-size: 13px;
      font-weight: 700;
    }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; }

    .chip {
      padding: 4px 7px;
      border-radius: 999px;
      background: #f1f5f9;
      color: #435052;
      font-size: 12px;
      font-weight: 800;
    }

    .chip.reserve { background: #eef4ff; color: #1d4ed8; }
    .chip.wait { background: #f8fafc; color: #64748b; }
    .chip.no { background: #f1f5f9; color: #475569; }

    .menu {
      padding: 9px;
      border: 1px solid #dfe9e5;
      border-radius: 8px;
      background: #f8fafc;
      font-size: 13px;
    }

    .menu b { color: #334155; }

    .menu-title {
      display: block;
      margin-bottom: 6px;
      color: #222;
      font-weight: 800;
    }

    .menu-list {
      margin: 0;
      padding-left: 18px;
    }

    .menu-list li {
      margin: 3px 0;
    }

    .price-line {
      display: block;
      margin-top: 8px;
      padding-top: 7px;
      border-top: 1px solid #e5e7eb;
    }

    .why {
      color: #39474a;
      font-size: 13px;
      margin-top: 2px;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: auto;
    }

    .choose {
      width: 100%;
      margin-top: 3px;
    }

    .dessert-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
    }

    .snack-strip {
      margin-top: 14px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f8fafc;
    }

    .snack-strip h3 {
      margin: 0 0 4px;
      font-size: 18px;
    }

    .snack-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 4px;
    }

    .snack-head h3 {
      margin: 0;
    }

    .none-dessert {
      min-height: 32px;
      padding: 6px 12px;
      background: #fff;
      color: #222;
      border: 1px solid #d33;
    }

    .none-dessert.is-selected {
      background: #222;
      color: #fff;
      border-color: #222;
    }

    .snack-strip > p {
      margin: 0 0 12px;
      color: #64748b;
      font-size: 13px;
    }

    .snack-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .snack-card {
      display: block;
      align-items: stretch;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
      cursor: pointer;
    }

    .snack-card div {
      padding: 12px;
    }

    .snack-card h4 {
      margin: 0 0 3px;
      font-size: 15px;
    }

    .snack-card p {
      margin: 0 0 8px;
      color: #4a4030;
      font-size: 12px;
    }

    .map-note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(12, 18, 19, .62);
    }

    .modal-backdrop.is-open { display: flex; }

    .modal {
      width: min(760px, 100%);
      max-height: min(88vh, 860px);
      overflow: auto;
      border-radius: 14px;
      background: #ffffff;
      box-shadow: 0 24px 80px rgba(0,0,0,.32);
    }

    .modal-body {
      padding: 18px;
    }

    .modal-top {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .modal h2 {
      margin: 0;
      font-size: 25px;
      line-height: 1.25;
    }

    .modal-close {
      flex: 0 0 auto;
      width: 38px;
      height: 38px;
      padding: 0;
      border-radius: 50%;
      color: #263235;
      background: #f1f5f9;
      border-color: #e2e8f0;
      font-size: 21px;
    }

    .modal-section {
      margin-top: 14px;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
    }

    .modal-section b {
      display: block;
      margin-bottom: 7px;
      color: var(--green);
    }

    .modal-section ul {
      margin: 0;
      padding-left: 18px;
    }

    .modal-section li { margin: 4px 0; }

    .recommend-modal {
      width: min(1060px, calc(100vw - 28px));
    }

    .recommend-controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .recommend-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    .recommend-field input,
    .recommend-field select,
    .candidate-row textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 9px 10px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    .search-links {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .search-card {
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--text);
      background: #fafafa;
      font-size: 13px;
      line-height: 1.35;
    }

    .search-card strong {
      font-size: 14px;
      line-height: 1.35;
    }

    .search-card .jp-query {
      color: var(--muted);
      font-size: 12px;
      word-break: keep-all;
    }

    .search-card .search-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .search-card .search-meta span {
      padding: 3px 7px;
      border-radius: 999px;
      background: #eef5f2;
      color: #31423c;
      font-size: 12px;
    }

    .search-card a {
      width: fit-content;
      margin-top: auto;
      padding: 7px 10px;
      border-radius: 7px;
      color: #fff;
      background: #222;
      text-decoration: none;
      font-weight: 700;
      font-size: 12px;
    }

    .search-card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: auto;
    }

    .recommend-map-layout {
      display: grid;
      grid-template-columns: 290px minmax(0, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .recommend-map-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      max-height: min(54vh, 560px);
      min-height: 420px;
      overflow: auto;
    }

    .recommend-map-panel strong {
      font-size: 15px;
    }

    .recommend-map-panel .jp-query {
      color: var(--muted);
      word-break: keep-all;
    }

    .recommend-search-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .recommend-search-item {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      cursor: pointer;
    }

    .recommend-search-item.is-active {
      border-color: #222;
      box-shadow: inset 3px 0 0 #222;
    }

    .recommend-search-title {
      display: block;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .recommend-search-query {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      word-break: keep-all;
    }

    .recommend-search-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 7px;
    }

    .recommend-search-meta span {
      border-radius: 999px;
      background: var(--chip);
      padding: 3px 7px;
      font-size: 12px;
      color: var(--accent);
    }

    .recommend-map-frame {
      width: 100%;
      height: min(54vh, 560px);
      min-height: 420px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f5f5f5;
    }

    .candidate-editor {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .candidate-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .candidate-row strong {
      font-size: 14px;
    }

    .recommend-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
    }

    .recommend-status {
      color: var(--muted);
      font-size: 13px;
    }

    .map-modal {
      width: min(1280px, calc(100vw - 28px));
    }

    .map-layout {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      border: 1px solid var(--line);
      border-radius: 7px;
      overflow: hidden;
      background: #fff;
    }

    .map-frame {
      width: 100%;
      height: min(76vh, 720px);
      border: 0;
      display: block;
      background: #f5f5f5;
    }

    .store-info {
      display: flex;
      flex-direction: column;
      gap: 11px;
      max-height: min(76vh, 720px);
      overflow: auto;
      padding: 20px 18px;
      border-right: 1px solid var(--line);
      background: #fff;
      font-size: 14px;
    }

    .store-info strong {
      color: var(--text);
      font-size: 23px;
      line-height: 1.25;
    }

    .store-info .ko-name {
      margin-top: -7px;
      color: var(--muted);
      font-size: 15px;
    }

    .store-info .info-line {
      display: grid;
      grid-template-columns: 54px 1fr;
      gap: 8px;
      line-height: 1.45;
    }

    .store-info .info-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .store-info .menu {
      margin-top: 2px;
    }

    footer {
      margin-top: 30px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 1040px) {
      .planner { grid-template-columns: 1fr; }
      .selected-panel { position: static; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .dessert-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 680px) {
      .wrap { width: min(100% - 28px, 1180px); }
      .hero { min-height: auto; }
      .day { padding: 15px; }
      .day-head { grid-template-columns: 1fr; }
      .route, .grid, .dessert-grid { grid-template-columns: 1fr; }
      .map-layout { grid-template-columns: 1fr; }
      .store-info {
        max-height: none;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .map-frame { height: 62vh; }
      .snack-grid { grid-template-columns: 1fr; }
      .meal-title { display: block; }
      .meal-title span { display: block; margin-top: 3px; }
    }

    /* Simple personal planner look */
    :root {
      --ink: #222;
      --muted: #666;
      --line: #ddd;
      --paper: #fff;
      --card: #fff;
      --green: #222;
      --green2: #f5f5f5;
      --red: #222;
      --yellow: #ddd;
      --soft: #f7f7f7;
      --shadow: none;
      --shadow2: none;
    }

    body, .hero, .topbar { background: #fff; color: #222; }
    .hero { border-bottom: 1px solid #ddd; }
    .lead { color: #666; }

    let cloudSaveTimer = null;
    let isBooting = true;
    let currentRecommendMealId = null;

    function currentState() {
      const mealOptions = {};
      for (const day of days) {
        for (const meal of day.meals) mealOptions[meal.id] = meal.options;
      }
      const dessertOptions = {};
      for (const [dayId, slots] of Object.entries(dessertSlots)) {
        for (const [mealId, options] of Object.entries(slots)) {
          dessertOptions[`${dayId}:${mealId}`] = options;
        }
      }
      return {
        selected,
        selectedDesserts,
        rerollCursor,
        mealOptions,
        dessertOptions,
        savedAt: new Date().toISOString()
      };
    }

    function saveState() {
      const state = currentState();
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (error) {
        console.warn("Failed to save itinerary state", error);
      }
      if (!isBooting) queueCloudSave(state);
    }

    function applyState(state) {
      if (!state) return;
      for (const day of days) {
        for (const meal of day.meals) {
          if (Array.isArray(state.mealOptions?.[meal.id])) {
            meal.options = state.mealOptions[meal.id];
          }
        }
      }
      for (const [slot, options] of Object.entries(state.dessertOptions || {})) {
        const [dayId, mealId] = slot.split(":");
        if (dessertSlots[dayId]?.[mealId] && Array.isArray(options)) {
          dessertSlots[dayId][mealId] = options;
        }
      }
      Object.assign(selected, state.selected || {});
      Object.assign(selectedDesserts, state.selectedDesserts || {});
      Object.assign(rerollCursor, state.rerollCursor || {});
    }

    function restoreState() {
      let state = null;
      try {
        state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
      } catch (error) {
        console.warn("Failed to load itinerary state", error);
      }
      applyState(state);
    }

    function supabaseEnabled() {
      return SUPABASE_CONFIG.url && SUPABASE_CONFIG.key && SUPABASE_CONFIG.bucket && SUPABASE_CONFIG.statePath;
    }

    function supabaseObjectUrl() {
      return `${SUPABASE_CONFIG.url}/storage/v1/object/${SUPABASE_CONFIG.bucket}/${SUPABASE_CONFIG.statePath}`;
    }

    function supabasePublicUrl() {
      return `${SUPABASE_CONFIG.url}/storage/v1/object/public/${SUPABASE_CONFIG.bucket}/${SUPABASE_CONFIG.statePath}?v=${Date.now()}`;
    }

    function queueCloudSave(state) {
      if (!supabaseEnabled()) return;
      window.clearTimeout(cloudSaveTimer);
      cloudSaveTimer = window.setTimeout(() => saveCloudState(state), 500);
    }

    async function saveCloudState(state) {
      if (!supabaseEnabled()) return;
      try {
        const response = await fetch(supabaseObjectUrl(), {
          method: "POST",
          headers: {
            apikey: SUPABASE_CONFIG.key,
            Authorization: `Bearer ${SUPABASE_CONFIG.key}`,
            "Content-Type": "application/json",
            "x-upsert": "true"
          },
          body: JSON.stringify(state)
        });
        if (!response.ok) {
          console.warn("Supabase itinerary save failed", response.status, await response.text());
        }
      } catch (error) {
        console.warn("Supabase itinerary save failed", error);
      }
    }

    async function loadCloudState() {
      if (!supabaseEnabled()) return;
      try {
        const response = await fetch(supabasePublicUrl(), { cache: "no-store" });
        if (!response.ok) return;
        const state = await response.json();
        applyState(state);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        renderDays();
        suppressFocus = true;
        for (const [mealId, index] of Object.entries(selected)) choose(mealId, index);
        syncAllDessertSelections();
        renderSelected();
        suppressFocus = false;
      } catch (error) {
        console.warn("Supabase itinerary load failed", error);
      }
    }

    function distanceMeters(from, to) {
      const a = coords[from];
      const b = coords[to];
      if (!a || !b) return null;
      const rad = Math.PI / 180;
      const dLat = (b[0] - a[0]) * rad;
      const dLon = (b[1] - a[1]) * rad;
      const lat1 = a[0] * rad;
      const lat2 = b[0] * rad;
      const h = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
      return Math.round(6371000 * 2 * Math.atan2(Math.sqrt(h), Math.sqrt(1 - h)));
    }

    function formatDistance(meters) {
      if (meters == null) return "거리 확인 필요";
      if (meters < 1000) return `약 ${Math.max(50, Math.round(meters / 50) * 50)}m`;
      return `약 ${(meters / 1000).toFixed(meters < 10000 ? 1 : 0)}km`;
    }

    function routeSummary(from, to, dayId) {
      const meters = distanceMeters(from, to);
      if (meters == null) return "구글 지도에서 거리 확인, 대중교통 이동";
      const distance = formatDistance(meters);
      let mode = "도보 이동";
      if (dayId === "day2" && meters > 5000) mode = "JR/페리/대중교통 이동";
      else if (dayId === "day3" && meters > 3000) mode = "지하철/택시 이동";
      else if (meters > 1200) mode = "대중교통 또는 택시 이동";
      return `${distance}, ${mode}`;
    }

    function rerollDessert(slot) {
      const [dayId, mealId] = slot.split(":");
      const entries = dessertEntriesForSlot(slot);
      if (entries.length < 2) return;
      cleanDessertSelection(slot);

      const currentIndexes = selectedDesserts[slot] || [];
      const currentItems = currentIndexes
        .map(index => dessertSlots[dayId]?.[mealId]?.[index])
        .filter(Boolean);
      const currentNames = new Set(currentItems.map(item => item.name));
      const pool = entries.map(entry => entry.item).filter(item => !currentNames.has(item.name));
      rerollCursor[slot] = (rerollCursor[slot] || 0) + 1;
      const start = rerollCursor[slot] % pool.length;
      const picked = [];
      const pickCount = Math.max(0, 3 - currentItems.length);
      for (let i = 0; i < Math.min(pickCount, pool.length); i += 1) {
        picked.push(pool[(start + i) % pool.length]);
      }

      dessertSlots[dayId][mealId] = [...currentItems, ...picked];
      selectedDesserts[slot] = currentItems.map((_, index) => index);
      renderDays();
      syncDessertSelection(slot);
      renderSelected();
      saveState();
    }

    function koreanMenuText(text) {
      const match = text.match(/\(([^)]+)\)/);
      if (match) return text.replace(/^.*?\(([^)]+)\)/, "$1").trim();
      return text.replace(/[A-Za-zぁ-んァ-ン一-龥々ー]+/g, "").replace(/\s+/g, " ").trim() || text;
    }

    function koreanMenuBlock(item) {
      const menuItems = String(item.menu || "")
        .split(" / ")
        .map(text => koreanMenuText(text.trim()))
        .filter(Boolean);
      return `
        <div class="menu">
          <span class="menu-title">추천 메뉴</span>
          <ul class="menu-list">
            ${menuItems.map(text => `<li>${text}</li>`).join("")}

            <p class="google-rating" data-google-rating="${option.name}">${googleRatingText(option)}</p>
            <div class="chips">
              <span class="chip ${option.reserveClass}">${option.reserveStatus}</span>
              <span class="chip">예산 ${option.price}</span>
            </div>
            ${menuBlock(option)}
            <p class="why">${option.why}</p>
            <div class="links">${linkButtons(option)}</div>
            <button class="choose primary" type="button" data-meal="${meal.id}" data-index="${index}">이걸로 선택</button>
          </div>
        </article>
      `;
    }

    function snackStrip(day, meal) {
      const slot = `${day.id}:${meal.id}`;
      const snacks = dessertEntriesForSlot(slot);
      if (!dessertSlots[day.id]?.[meal.id]) return "";
      return `
        <div class="snack-strip">
          <div class="snack-head">
            <div class="meal-title-left">
              <h3>디저트</h3>
              <button class="reroll" type="button" data-reroll-dessert="${slot}">추천 다시하기</button>
            </div>
            <button class="none-dessert" type="button" data-dessert-slot="${slot}" data-dessert-index="-1">없음</button>
          </div>
          <div class="snack-grid">
            ${snacks.length ? snacks.map(({ item, index, meters }) => `
              <article class="snack-card" data-snack-day="${day.id}" data-snack-meal="${meal.id}" data-snack-index="${index}" title="자세히 보기">
                <div>
                  ${nameBlock(item.name, "h4", item.ko)}
                  <p class="google-rating" data-google-rating="${item.name}">${googleRatingText(item)}</p>
                  <p><b>${formatDistance(meters)}, 도보 이동</b></p>
                  ${menuBlock(item)}
                  <div class="links">
                    ${item.mapQuery ? `<a class="btn light" href="${mapUrl(item.mapQuery)}" target="_blank" rel="noreferrer">매장 정보</a>` : ""}
                  </div>
                  <button class="choose primary" type="button" data-dessert-slot="${slot}" data-dessert-index="${index}">이 디저트 선택</button>
                </div>
              </article>
            `).join("") : `<div class="notice">도보 1km 이내 후보 없음</div>`}
          </div>
        </div>
      `;
    }

    function renderDays() {
      const html = days.map(day => `
        <section id="${day.id}" class="day">
          <div class="day-head">
            <div>
              <h2>${day.title}</h2>
              <p>${day.subtitle}</p>
            </div>
            <span class="tag">${day.tag}</span>
          </div>
          ${day.route ? `<div class="route">${day.route.map(step => `<div class="step"><b>${step[0]}</b>${step[1]}</div>`).join("")}</div>` : ""}
          ${day.meals.map(meal => `
            <div class="meal">
              <div class="meal-title">
                <div class="meal-title-left">
                  <h3>${meal.title}</h3>
                  <button class="reroll" type="button" data-reroll-meal="${meal.id}">추천 다시하기</button>
                </div>
                <span>${meal.note}</span>
              </div>
              <div class="grid">
                ${meal.options.some(option => isRecommendedByGoogle(option))
                  ? meal.options.map((option, index) => optionCard(meal, option, index)).join("")
                  : ``}
              </div>
            </div>
            ${snackStrip(day, meal)}
          `).join("")}
        </section>
      `).join("");

      document.querySelector("#content").innerHTML = html;
    }

    function mealLabel(mealId) {
      for (const day of days) {
        const meal = day.meals.find(item => item.id === mealId);
        if (meal) return `${day.title.split(":")[0]} · ${meal.title}`;
      }
      return mealId;
    }

    function findOption(mealId, index) {
      for (const day of days) {
        const meal = day.meals.find(item => item.id === mealId);
        if (meal) return meal.options[index];
      }
      return null;
    }

    function findMeal(mealId) {
      for (const day of days) {
        const meal = day.meals.find(item => item.id === mealId);
        if (meal) return meal;
      }
      return null;
    }

    function firstRecommendedIndex(meal) {
      const index = meal.options.findIndex(option => isRecommendedByGoogle(option));
      return index >= 0 ? index : 0;
    }

    function choose(mealId, index) {
      const meal = findMeal(mealId);
      const option = meal && meal.options[Number(index)];
      if (meal && option && Number(index) !== 0) {
        meal.options = rankedOptions([
          option,
          ...meal.options.filter((_, optionIndex) => optionIndex !== Number(index))
        ]);
        selected[mealId] = 0;
        renderDays();
        syncAllDessertSelections();
      } else {
        selected[mealId] = Number(index);
      }
      document.querySelectorAll(`.card[data-meal="${mealId}"]`).forEach(card => card.classList.remove("is-selected"));
      const card = document.querySelector(`.card[data-meal="${mealId}"][data-index="${selected[mealId]}"]`);
      if (card) card.classList.add("is-selected");
      renderSelected();
      saveState();
      if (!suppressFocus) focusSelected(mealId);
    }

    function syncDessertSelection(slot) {
      const selectedIndexes = selectedDesserts[slot] || [];
      document.querySelectorAll(`[data-dessert-slot="${slot}"]`).forEach(button => {
        const card = button.closest(".snack-card");
        if (card) card.classList.remove("is-selected");
        if (button.classList.contains("none-dessert")) button.classList.remove("is-selected");
      });
      if (!selectedIndexes.length) {
        const noneButton = document.querySelector(`[data-dessert-slot="${slot}"][data-dessert-index="-1"]`);
        if (noneButton) noneButton.classList.add("is-selected");
        return;
      }
      selectedIndexes.forEach(index => {
        const button = document.querySelector(`[data-dessert-slot="${slot}"][data-dessert-index="${index}"]`);
        const card = button && button.closest(".snack-card");
        if (card) card.classList.add("is-selected");
      });
    }

    function syncAllDessertSelections() {
      Object.keys(selectedDesserts).forEach(slot => syncDessertSelection(slot));
    }

    function chooseDessert(slot, index) {
      const dessertIndex = Number(index);
      if (dessertIndex < 0) {
        selectedDesserts[slot] = [];
      } else {
        const current = new Set(selectedDesserts[slot] || []);
        if (current.has(dessertIndex)) current.delete(dessertIndex);
        else current.add(dessertIndex);
        selectedDesserts[slot] = Array.from(current).sort((a, b) => a - b);
      }
      syncDessertSelection(slot);
      renderSelected();
      saveState();
      if (!suppressFocus) {
        const selectedIndexes = selectedDesserts[slot] || [];
        const focusSlot = dessertIndex >= 0 && selectedIndexes.includes(dessertIndex)
          ? `${slot}:${dessertIndex}`
          : (selectedIndexes.length ? `${slot}:${selectedIndexes[0]}` : slot.split(":")[1]);
        focusSelected(focusSlot);
      }
    }

    function focusSelected(slot) {
      const item = document.querySelector(`[data-selected-slot="${slot}"]`);
      const target = item || document.querySelector("#my-plan");
      target.scrollIntoView({ behavior: "smooth", block: "center" });
      target.classList.add("focused");
      window.setTimeout(() => target.classList.remove("focused"), 1200);
    }

    function renderSelected() {
      const rows = days.map(day => {
        const selectedStops = [];
        day.meals.forEach(meal => {
          const option = findOption(meal.id, selected[meal.id]);
          if (option && isRecommendedByGoogle(option)) selectedStops.push({ type: "meal", slot: meal.id, meal, option });
          const slot = `${day.id}:${meal.id}`;
          const dessertIndexes = selectedDesserts[slot] || [];
          dessertIndexes.forEach(dessertIndex => {
            const dessert = dessertSlots[day.id]?.[meal.id]?.[dessertIndex];
            if (dessert) selectedStops.push({ type: "dessert", slot, index: dessertIndex, meal: { title: "디저트" }, option: dessert });
          });
        });

        const anchor = dayAnchors[day.id];
        const routePoints = [
          anchor.start.query,
          ...selectedStops.map(stop => stop.option.mapQuery),
          anchor.end.query
        ];

        const dayRoute = `
          <div class="day-route-actions">
            <a class="btn primary" href="${multiStopMapUrl(routePoints)}" target="_blank" rel="noreferrer">이날 전체 동선</a>
            <a class="btn light" href="${mapUrl(anchor.start.query)}" target="_blank" rel="noreferrer">출발지 지도</a>
          </div>
        `;

        const items = selectedStops.map((stop, index) => {
          const { meal, option, type } = stop;
          if (!option) return "";
          const reserveButton = option.links && option.links.reserve
            ? `<a class="btn primary" href="${option.links.reserve}" target="_blank" rel="noreferrer">예약</a>`
            : "";
          const prev = index === 0
            ? anchor.start
            : { label: selectedStops[index - 1].option.name, query: selectedStops[index - 1].option.mapQuery };
          const routeMode = "transit";
          const routeText = routeSummary(prev.query, option.mapQuery, day.id);
          const routeBetween = `
            <div class="route-link">
              <span>→</span>
              <div>
                ${routeText}
                <div class="selected-actions">
                  <a class="btn light" href="${directionsUrl(prev.query, option.mapQuery, routeMode)}" target="_blank" rel="noreferrer" data-route-link="true" data-route-title="구간 경로" data-route-from="${attr(prev.label)}" data-route-to="${attr(option.name)}" data-route-summary="${attr(routeText)}">구간 경로</a>
                </div>
              </div>
            </div>
          `;
          return `
            ${routeBetween}
            <div class="selected-item" data-selected-slot="${type === "dessert" ? `${stop.slot}:${stop.index}` : stop.slot}">
              <b>${type === "dessert" ? "디저트" : meal.title}</b>
              ${nameBlock(option.name, "strong", option.ko)}
              ${type === "dessert" ? menuBlock(option, true) : koreanMenuBlock(option)}
              <div class="selected-actions">
                ${reserveButton}
                <a class="btn light" href="${mapUrl(option.mapQuery)}" target="_blank" rel="noreferrer">매장 정보</a>
              </div>
            </div>
          `;
        }).join("");

        return `
          <div class="selected-day">
            <h3>${day.title.split(":")[0]}</h3>
            ${dayRoute}
            ${items}
            <div class="route-link">
              <span>→</span>
              <div>
                ${routeSummary(selectedStops[selectedStops.length - 1].option.mapQuery, anchor.end.query, day.id)}
                <div class="selected-actions">
                  <a class="btn light" href="${directionsUrl(selectedStops[selectedStops.length - 1].option.mapQuery, anchor.end.query, "transit")}" target="_blank" rel="noreferrer" data-route-link="true" data-route-title="복귀/이동 경로" data-route-from="${attr(selectedStops[selectedStops.length - 1].option.name)}" data-route-to="${attr(anchor.end.label)}" data-route-summary="${attr(routeSummary(selectedStops[selectedStops.length - 1].option.mapQuery, anchor.end.query, day.id))}">복귀/이동 경로</a>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join("");

      const total = days.reduce((sum, day) => {
        return sum + day.meals.reduce((daySum, meal) => {
          const option = findOption(meal.id, selected[meal.id]);
          return daySum + (option ? option.budget : 0);
        }, 0);
      }, 0);

      document.querySelector("#selected-list").innerHTML = rows;
      document.querySelector("#total").innerHTML = `선택 식비 예상: 1인 약 ${total.toLocaleString("ko-KR")}엔 + 디저트/교통비 별도`;
    }

    function actionButtons(item) {
      const links = item.links || {};
      const buttons = [];
      if (links.reserve) buttons.push(`<a class="btn primary" href="${links.reserve}" target="_blank" rel="noreferrer">예약</a>`);
      if (links.altReserve) buttons.push(`<a class="btn primary" href="${links.altReserve}" target="_blank" rel="noreferrer">예약2</a>`);
      if (item.mapQuery) buttons.push(`<a class="btn light" href="${mapUrl(item.mapQuery)}" target="_blank" rel="noreferrer">매장 정보</a>`);
      return buttons.join("");
    }

    function openModal(item) {
      const modal = document.querySelector("#detail-modal");
      document.querySelector("#modal-title").innerHTML = nameBlock(item.name, "span", item.ko);
      document.querySelector("#modal-location").textContent = item.location || item.time || "";
      document.querySelector("#modal-menu").innerHTML = String(item.menu || "")
        .split(" / ")
        .map(text => `<li>${text}</li>`)
        .join("");
      document.querySelector("#modal-why").textContent = item.why || item.time || "";
      document.querySelector("#modal-actions").innerHTML = actionButtons(item);
      modal.classList.add("is-open");
      modal.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
      const modal = document.querySelector("#detail-modal");
      modal.classList.remove("is-open");
      modal.setAttribute("aria-hidden", "true");
    }

    function embedMapUrl(rawUrl) {
      const url = new URL(rawUrl, window.location.href);
      if (url.pathname.includes("/search")) {
        const query = url.searchParams.get("query") || "";
        return "https://maps.google.com/maps?q=" + encodeURIComponent(query) + "&z=17&iwloc=A&output=embed";
      }
      if (url.pathname.includes("/dir")) {
        const origin = url.searchParams.get("origin") || "";
        const destination = url.searchParams.get("destination") || "";
        const waypoints = url.searchParams.get("waypoints");
        const pieces = [destination];
        if (waypoints) pieces.unshift(...waypoints.split("|"));
        return "https://www.google.com/maps?output=embed"
          + "&saddr=" + encodeURIComponent(origin)
          + "&daddr=" + encodeURIComponent(pieces.filter(Boolean).join(" to "));
      }
      url.searchParams.set("output", "embed");
      return url.toString();
    }

    function fullGoogleMapUrl(rawUrl) {
      const url = new URL(rawUrl, window.location.href);
      url.searchParams.delete("output");
      url.searchParams.set("hl", "ko-KR");
      if (url.pathname.includes("/search")) {
        const query = url.searchParams.get("query") || "";
        return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(query) + "&hl=ko-KR";
      }
      return url.toString();
    }

    function storeInfoHtml(item, googleUrl = "") {
      if (!item) return `<div>구글 지도 팝업</div>`;
      const detail = storeDetails[item.name] || {};
      const merged = { ...detail, ...item };
      const menuItems = String(merged.fullMenu || merged.menu || "")
        .split(" / ")
        .map(text => text.trim())
        .filter(Boolean);
      const reserveText = merged.reserveStatus ? `<div class="info-line"><span class="info-label">예약</span><span>${merged.reserveStatus}</span></div>` : "";
      const hoursText = merged.hours || "구글 매장정보에서 확인";
      const addressText = merged.address || merged.location || merged.time || "";
      return `
        <strong>${merged.name}</strong>
        ${nameKo[merged.name] ? `<span class="ko-name">${nameKo[merged.name]}</span>` : ""}
        <div class="info-line"><span class="info-label">평점</span><span>${googleRatingText(merged)}</span></div>
        <div class="info-line"><span class="info-label">영업</span><span>${hoursText}</span></div>
        <div class="info-line"><span class="info-label">가격</span><span>${merged.price || "지도에서 확인"}</span></div>
        ${reserveText}
        <div class="info-line"><span class="info-label">위치</span><span>${addressText}</span></div>
        ${menuItems.length ? `
          <div class="menu">
            <span class="menu-title">매장 메뉴</span>
            <ul class="menu-list">${menuItems.map(text => `<li>${text}</li>`).join("")}</ul>
          </div>
        ` : ""}
      `;
    }

    function openMapModal(url, title = "지도", item = null) {
      const modal = document.querySelector("#map-modal");
      const targetItem = item || findItemByMapUrl(url);
      const googleUrl = fullGoogleMapUrl(url);
      document.querySelector("#map-title").textContent = targetItem ? "매장 정보" : title;
      document.querySelector("#store-info").innerHTML = storeInfoHtml(targetItem, googleUrl);
      document.querySelector("#map-frame").src = embedMapUrl(url);
      modal.classList.add("is-open");
      modal.setAttribute("aria-hidden", "false");
    }

    function routePlanItems(summary) {
      const kmMatch = String(summary || "").match(/약 ([0-9.]+)km/);
      const metersMatch = String(summary || "").match(/약 ([0-9,]+)m/);
      const km = kmMatch ? Number(kmMatch[1]) : (metersMatch ? Number(metersMatch[1].replace(/,/g, "")) / 1000 : 0);
      if (summary.includes("JR/페리") || km >= 5) {
        return [
          "1안 대중교통 우선: 구글 추천 경로 기준으로 이동합니다. 장거리 구간은 JR, 페리, 버스 조합을 우선 확인하세요.",
          "2안 환승 적게: 시간이 조금 늘어도 갈아타는 횟수가 적은 경로를 선택합니다. 동행이 많을 때 가장 무난합니다.",
          "3안 택시 병행: 역·항구·시장 사이 짧은 연결 구간은 택시를 섞어 걷는 시간을 줄입니다."
        ];
      }
      if (km >= 1.2) {
        return [
          "1안 대중교통 우선: 가까운 역이나 버스 정류장까지 걸은 뒤 한 구간 이동합니다.",
          "2안 택시 우선: 짐이 있거나 날씨가 좋지 않으면 바로 택시로 이동합니다.",
          "3안 도보 병행: 쇼핑가나 지하상가를 지나갈 수 있으면 천천히 걸어 이동합니다."
        ];
      }
      return [
        "1안 도보 최단: 지도상 가장 짧은 도보 경로로 바로 이동합니다.",
        "2안 큰길 우선: 거리는 조금 늘어도 큰길과 횡단보도 위주로 이동합니다.",
        "3안 실내/상가 경유: 지하상가나 쇼핑몰 통로를 이용할 수 있으면 비·추위를 피해서 이동합니다."
      ];
    }

    function routeInfoHtml(link) {
      const plans = routePlanItems(link.dataset.routeSummary || "");
      return `
        <strong>${link.dataset.routeTitle || "이동 경로"}</strong>
        <div class="info-line"><span class="info-label">출발</span><span>${link.dataset.routeFrom || "출발지"}</span></div>
        <div class="info-line"><span class="info-label">도착</span><span>${link.dataset.routeTo || "도착지"}</span></div>
        <div class="info-line"><span class="info-label">이동</span><span>${link.dataset.routeSummary || "구글 지도에서 확인"}</span></div>
        <div class="info-line"><span class="info-label">기준</span><span>대중교통 우선, 가까운 구간은 도보</span></div>
        <div class="menu">
          <span class="menu-title">추천 경로 3가지</span>
          <ul class="menu-list">${plans.map(text => `<li>${text}</li>`).join("")}</ul>
        </div>
      `;
    }

    function openRouteModal(link) {
      const modal = document.querySelector("#map-modal");
      document.querySelector("#map-title").textContent = link.dataset.routeTitle || "이동 경로";
      document.querySelector("#store-info").innerHTML = routeInfoHtml(link);
      document.querySelector("#map-frame").src = embedMapUrl(link.href);
      modal.classList.add("is-open");
      modal.setAttribute("aria-hidden", "false");
    }

    function closeMapModal() {
      const modal = document.querySelector("#map-modal");
      modal.classList.remove("is-open");
      modal.setAttribute("aria-hidden", "true");
      document.querySelector("#map-frame").src = "about:blank";
    }

    for (const day of days) {
      for (const meal of day.meals) selected[meal.id] = firstRecommendedIndex(meal);
    }
    for (const [dayId, slots] of Object.entries(dessertSlots)) {
      for (const mealId of Object.keys(slots)) selectedDesserts[`${dayId}:${mealId}`] = [];
    }
    restoreState();
    renderDays();

    document.addEventListener("click", event => {
      const mapLink = event.target.closest('a[href*="google.com/maps"]');
      if (mapLink) {
        if (mapLink.dataset.googleSearchLink === "external") return;
        event.preventDefault();
        if (mapLink.dataset.routeLink === "true") {
          openRouteModal(mapLink);
          return;
        }
        openMapModal(mapLink.href, mapLink.textContent.trim() || "지도", findItemByMapUrl(mapLink.href));
        return;
      }

      const recommendSearchButton = event.target.closest("button[data-recommend-search]");
      if (recommendSearchButton) {
        setRecommendMap(Number(recommendSearchButton.dataset.recommendSearch));
        return;
      }

      const button = event.target.closest("button[data-meal]");
      if (button) {
        choose(button.dataset.meal, button.dataset.index);
        return;
      }

      const dessertButton = event.target.closest("button[data-dessert-slot]");
      if (dessertButton) {
        chooseDessert(dessertButton.dataset.dessertSlot, dessertButton.dataset.dessertIndex);
        return;
      }

      const rerollButton = event.target.closest("button[data-reroll-meal]");
      if (rerollButton) {
        rerollMeal(rerollButton.dataset.rerollMeal);
        return;
      }

      const rerollDessertButton = event.target.closest("button[data-reroll-dessert]");
      if (rerollDessertButton) {
        rerollDessert(rerollDessertButton.dataset.rerollDessert);
        return;
      }

      if (event.target.closest("a, button")) return;

      const snack = event.target.closest(".snack-card[data-snack-day]");
      if (snack) {
        const snackIndex = Number(snack.dataset.snackIndex);
        const item = dessertSlots[snack.dataset.snackDay]?.[snack.dataset.snackMeal]?.[snackIndex];
        if (item) openModal(item);
        return;
      }

      const dessertCard = event.target.closest(".card[data-dessert-index]");
      if (dessertCard) {
        const item = desserts[Number(dessertCard.dataset.dessertIndex)];
        if (item) openModal(item);
        return;
      }

      const card = event.target.closest(".card[data-meal]");
      if (card) {
        const item = findOption(card.dataset.meal, Number(card.dataset.index));
        if (item) openModal(item);
      }
    });

    document.querySelector("#modal-close").addEventListener("click", closeModal);
    document.querySelector("#detail-modal").addEventListener("click", event => {
      if (event.target.id === "detail-modal") closeModal();
    });
    document.querySelector("#map-close").addEventListener("click", closeMapModal);
    document.querySelector("#map-modal").addEventListener("click", event => {
      if (event.target.id === "map-modal") closeMapModal();
    });
    document.querySelector("#recommend-close").addEventListener("click", closeRecommendModal);
    document.querySelector("#recommend-modal").addEventListener("click", event => {
      if (event.target.id === "recommend-modal") closeRecommendModal();
    });
    document.querySelector("#apply-recommendations").addEventListener("click", applyRecommendationCandidates);
    ["#recommend-rating", "#recommend-distance", "#recommend-menu", "#recommend-price"].forEach(selector => {
      document.querySelector(selector).addEventListener("input", renderRecommendSearches);
      document.querySelector(selector).addEventListener("change", renderRecommendSearches);
    });
    document.querySelector("#refresh-info").addEventListener("click", () => {
      refreshGoogleInfo();
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        closeModal();
        closeMapModal();
        closeRecommendModal();
      }
    });

    suppressFocus = true;
    for (const [mealId, index] of Object.entries(selected)) choose(mealId, index);
    syncAllDessertSelections();
    renderSelected();
    suppressFocus = false;
    loadCloudState().finally(() => {
      isBooting = false;
    });
  </script>
</body>
</html>
